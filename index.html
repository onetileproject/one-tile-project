<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Tile Project</title>

<style>
* { box-sizing: border-box; }

html, body {
margin: 0;
width: 100%;
height: 100%;
overflow: hidden;
font-family: Arial, Helvetica, sans-serif;
background: #0b0b0b;
color: white;
}

body {
display: flex;
align-items: center;
justify-content: center;
background:
radial-gradient(circle at 50% 20%, #232323 0%, #111111 42%, #080808 100%);
}

.page {
width: 100vw;
height: 100vh;
height: 100svh;
display: flex;
flex-direction: column;
gap: 12px;
padding: 14px;
overflow: hidden;
}

.header {
text-align: center;
flex: 0 0 auto;
}

.header h1 {
margin: 0 0 8px 0;
font-size: clamp(30px, 4vw, 48px);
line-height: 1.04;
color: #f7f7f7;
text-shadow: 0 0 18px rgba(255,255,255,0.08);
}

.header p {
margin: 0;
font-size: clamp(13px, 1.6vw, 18px);
color: #d4d4d4;
}

.topbar {
width: min(96vw, 1100px);
margin: 0 auto;
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
flex-wrap: wrap;
flex: 0 0 auto;
}

.progress-wrap {
width: min(440px, 72vw);
}

.progress-line {
display: flex;
justify-content: space-between;
font-size: 12px;
color: #d7d7d7;
margin-bottom: 6px;
}

.progress-bar {
height: 12px;
border-radius: 999px;
background: rgba(255,255,255,0.13);
overflow: hidden;
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
}

.progress-fill {
width: 12%;
height: 100%;
border-radius: 999px;
background: linear-gradient(90deg, #cfd7dd 0%, #ffffff 100%);
box-shadow: 0 0 18px rgba(255,255,255,0.22);
}

.buy-btn {
border: 0;
border-radius: 999px;
padding: 12px 22px;
font-size: 15px;
font-weight: bold;
cursor: pointer;
color: #111;
background: #f2f2f2;
box-shadow: 0 8px 24px rgba(255,255,255,0.10);
}

.board-wrap {
flex: 1 1 auto;
min-height: 0;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.artboard {
position: relative;
width: min(96vw, 1100px);
aspect-ratio: 1 / 1;
max-height: calc(100vh - 160px);
max-height: calc(100svh - 160px);
border-radius: 26px;
overflow: hidden;
border: 1px solid rgba(255,255,255,0.12);
background:
radial-gradient(circle at 50% 45%, rgba(255,255,255,0.08), transparent 22%),
radial-gradient(circle at center, #202020 0%, #151515 44%, #0b0b0b 100%);
box-shadow:
inset 0 0 0 1px rgba(255,255,255,0.03),
0 0 60px rgba(0,0,0,0.38);
}

.artboard::before {
content: "";
position: absolute;
inset: 0;
pointer-events: none;
background:
radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06), transparent 28%),
radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02), transparent 50%);
}

svg {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
display: block;
}

.hint {
position: absolute;
left: 50%;
bottom: 12px;
transform: translateX(-50%);
font-size: 12px;
color: rgba(255,255,255,0.78);
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.10);
padding: 8px 12px;
border-radius: 999px;
backdrop-filter: blur(6px);
white-space: nowrap;
}

@media (max-width: 700px) {
.page { padding: 10px; gap: 8px; }
.artboard {
width: 96vw;
max-height: calc(100vh - 182px);
max-height: calc(100svh - 182px);
border-radius: 18px;
}
.buy-btn {
padding: 11px 18px;
font-size: 14px;
}
.hint {
font-size: 10px;
bottom: 8px;
padding: 7px 10px;
}
}
</style>
</head>

<script>
const svgNS = "http://www.w3.org/2000/svg";
const tilesGroup = document.getElementById("tiles");

function addTile(x, y, size, opacity) {
const r = document.createElementNS(svgNS, "rect");
r.setAttribute("x", x);
r.setAttribute("y", y);
r.setAttribute("width", size);
r.setAttribute("height", size);
r.setAttribute("rx", size * 0.24);
r.setAttribute("ry", size * 0.24);
r.setAttribute("fill", `rgba(255,255,255,${opacity})`);
r.setAttribute("stroke", "rgba(255,255,255,0.08)");
r.setAttribute("stroke-width", "0.45");
tilesGroup.appendChild(r);
}

const cols = 150;
const rows = 150;
const startX = 115;
const startY = 115;
const area = 770;
const gap = 1.1;
const size = (area - gap * (cols - 1)) / cols;

for (let row = 0; row < rows; row++) {
for (let col = 0; col < cols; col++) {
const x = startX + col * (size + gap);
const y = startY + row * (size + gap);
const opacity = 0.18 + ((row + col) % 6) * 0.02;
addTile(x, y, size, opacity);
}
}
</script>
