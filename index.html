<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Tile Project</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#ffffff;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

h1{
margin:28px 0 10px 0;
font-size:36px;
letter-spacing:0.4px;
}

p{
margin:0 0 26px 0;
color:#bdbdbd;
font-size:16px;
}

.artboard{
margin:32px auto 56px auto;
width:min(92vw,1100px);
aspect-ratio:1 / 1;
position:relative;
border-radius:24px;
overflow:hidden;
border:1px solid #1d1d1d;
background:
radial-gradient(circle at center, #171717 0%, #101010 58%, #080808 100%);
box-shadow:0 0 50px rgba(0,0,0,0.45);
}

.grid{
position:absolute;
inset:0;
z-index:2;
display:grid;
grid-template-columns:repeat(40, 1fr);
gap:1px;
width:min(78vw,760px);
height:min(78vw,760px);
margin:auto;
top:0; right:0; bottom:0; left:0;
}

.tile{
width:100%;
aspect-ratio:1 / 1;
background:#1b1b1b;
border-radius:8px;
cursor:pointer;
transition:background 0.2s ease, transform 0.15s ease;
opacity:0.9;
}

.tile:hover{
background:#2b2b2b;
transform:scale(1.02);
}
</style>
</head>
<body>

<h1>One Tile Project</h1>
<p>Claim your tile. Leave your mark. Be part of digital history.</p>

<div class="artboard">
<div class="grid">
<script>
for(let i=0;i<1600;i++){
document.write('<div class="tile"></div>');
}
</script>
</div>
</div>

</body>
</html>
