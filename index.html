<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Tile Project</title>


<style>

*{box-sizing:border-box}


html,body{

  margin:0;

  height:100%;

  font-family:Arial,Helvetica,sans-serif;

  background:#f5f1ea;

  overflow:hidden;

}


.page{

  width:100vw;

  height:100vh;

  display:flex;

  align-items:center;

  justify-content:center;

  background:url("page-background.png") center/cover no-repeat;

}


.container{

  width:min(1400px,94vw);

  height:92vh;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:flex-start;

}


.title{

  font-size:64px;

  font-family:"Brush Script MT",cursive;

  margin:10px 0 0;

  background:linear-gradient(90deg,#2c7ddf,#9c48c9,#d76831,#d84a4a);

  -webkit-background-clip:text;

  color:transparent;

}


.tagline{

  margin:6px 0 14px;

  color:#555;

  font-size:20px;

}


.main{

  width:100%;

  display:grid;

  grid-template-columns: 1fr 230px;

  gap:28px;

  align-items:center;

  justify-content:center;

}


.board-wrap{

  display:flex;

  justify-content:center;

}


.board{

  width:min(640px,65vh);

  aspect-ratio:1/1;

  border-radius:26px;

  overflow:hidden;

  border:4px solid rgba(255,255,255,0.9);

  position:relative;

  box-shadow:0 14px 30px rgba(0,0,0,0.12);

}


.board img{

  width:100%;

  height:100%;

  object-fit:contain;

  object-position:center;

  display:block;

}


/* blur layer for public */

.board::after{

  content:"";

  position:absolute;

  inset:0;

  backdrop-filter:blur(18px);

  background:rgba(255,255,255,0.18);

}


body.admin .board::after{

  display:none;

}


.panel{

  background:rgba(255,255,255,0.86);

  backdrop-filter:blur(6px);

  border-radius:18px;

  padding:16px;

  display:flex;

  flex-direction:column;

  gap:14px;

  box-shadow:0 10px 20px rgba(0,0,0,0.08);

}


.progress{

  text-align:center;

}


.bar{

  height:12px;

  border-radius:20px;

  border:1px solid rgba(0,0,0,0.2);

  overflow:hidden;

}


.fill{

  height:100%;

  width:0%;

  background:#888;

}


button{

  border:none;

  border-radius:14px;

  padding:12px;

  background:#f2e8da;

  font-size:16px;

  cursor:pointer;

}


.share{

  background:white;

}


.socials{

  display:flex;

  justify-content:center;

  gap:10px;

}


.social{

  width:36px;

  height:36px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-size:14px;

}


.instagram{background:linear-gradient(45deg,#fdf497,#fd5949,#d6249f,#285AEB)}

.x{background:#000}

.tiktok{background:#111}

.facebook{background:#1877f2}


.footer{

  text-align:center;

  font-size:12px;

  color:#666;

  margin-top:4px;

}


@media(max-width:1000px){

  .main{

    grid-template-columns:1fr;

  }

}

</style>

</head>


<body>


<div class="page">


<div class="container">


<h1 class="title">One Tile Project</h1>

<div class="tagline">Claim your tile. Leave your mark. Be part of digital history.</div>


<div class="main">


<div class="board-wrap">

<div class="board">

<img src="swallow-artwork.png" alt="">

</div>

</div>


<div class="panel">


<div class="progress">

<div>0%</div>

<div class="bar"><div class="fill"></div></div>

</div>


<button>Buy Tiles</button>

<button class="share">Share</button>

<button class="share">Find My Tile</button>


<div class="socials">

<div class="social instagram">I</div>

<div class="social x">X</div>

<div class="social tiktok">T</div>

<div class="social facebook">f</div>

</div>


<div class="footer">

<div>Terms & Conditions</div>

<div>Privacy Policy</div>

<div>© 2024 One Tile Project</div>

</div>


</div>


</div>


</div>


</div>


<script>

if(new URLSearchParams(location.search).get("admin")==="true"){

 document.body.classList.add("admin")

}

</script>


</body>

</html>
