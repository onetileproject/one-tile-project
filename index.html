<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: #f7f5f1;

      color: #1f1f1f;

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      height: 100svh;

      overflow: hidden;

      position: relative;

      background:

        radial-gradient(circle at 14% 62%, rgba(69, 156, 255, 0.26) 0, rgba(69, 156, 255, 0.00) 12%),

        radial-gradient(circle at 20% 72%, rgba(255, 173, 51, 0.24) 0, rgba(255, 173, 51, 0.00) 11%),

        radial-gradient(circle at 28% 78%, rgba(156, 91, 255, 0.20) 0, rgba(156, 91, 255, 0.00) 10%),

        radial-gradient(circle at 79% 58%, rgba(255, 112, 32, 0.24) 0, rgba(255, 112, 32, 0.00) 12%),

        radial-gradient(circle at 74% 70%, rgba(43, 193, 255, 0.24) 0, rgba(43, 193, 255, 0.00) 11%),

        radial-gradient(circle at 84% 77%, rgba(255, 211, 82, 0.20) 0, rgba(255, 211, 82, 0.00) 10%),

        radial-gradient(circle at 16% 30%, rgba(255, 102, 145, 0.12) 0, rgba(255, 102, 145, 0.00) 8%),

        radial-gradient(circle at 84% 28%, rgba(255, 148, 84, 0.12) 0, rgba(255, 148, 84, 0.00) 8%),

        #f7f5f1;

    }


    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.42;

      background-image:

        radial-gradient(circle at 13% 63%, rgba(52,132,255,0.70) 0 2px, transparent 3px),

        radial-gradient(circle at 17% 68%, rgba(255,164,44,0.72) 0 3px, transparent 4px),

        radial-gradient(circle at 25% 77%, rgba(136,89,255,0.60) 0 2px, transparent 3px),

        radial-gradient(circle at 78% 58%, rgba(255,105,28,0.72) 0 3px, transparent 4px),

        radial-gradient(circle at 82% 68%, rgba(58,190,255,0.70) 0 2px, transparent 3px),

        radial-gradient(circle at 73% 77%, rgba(255,206,84,0.66) 0 3px, transparent 4px),

        radial-gradient(circle at 18% 60%, rgba(0,0,0,0.09) 0 1px, transparent 2px),

        radial-gradient(circle at 80% 61%, rgba(0,0,0,0.09) 0 1px, transparent 2px),

        radial-gradient(circle at 22% 75%, rgba(255,255,255,0.60) 0 4px, transparent 5px),

        radial-gradient(circle at 76% 72%, rgba(255,255,255,0.55) 0 4px, transparent 5px);

      background-size: 100% 100%;

    }


    .page::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.12;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.5px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.5px);

      background-size: 28px 28px, 44px 44px;

      background-position: 0 0, 12px 16px;

    }


    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      height: 100%;

      max-width: 1200px;

      margin: 0 auto;

      display: flex;

      flex-direction: column;

      align-items: center;

      padding: 16px 18px 10px;

    }


    .title {

      margin: 0;

      font-size: clamp(38px, 5.8vw, 74px);

      line-height: 1;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #2366c7 0%, #7a36b6 45%, #d66d2f 75%, #d64545 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

      text-align: center;

    }


    .tagline {

      margin: 6px 0 10px;

      font-size: clamp(16px, 1.7vw, 24px);

      color: #383838;

      text-align: center;

      max-width: 900px;

    }


    .progress-value {

      font-size: 15px;

      color: #444;

      margin-bottom: 6px;

    }


    .progress {

      width: min(330px, 78vw);

      height: 10px;

      border-radius: 999px;

      background: #d9d9d9;

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);

    }


    .progress-bar {

      width: 0%;

      height: 100%;

      background: linear-gradient(90deg, #7fa6f0 0%, #577fda 100%);

      border-radius: 999px;

    }


    .buy-btn {

      margin-top: 12px;

      border: 1px solid rgba(0,0,0,0.18);

      background: rgba(255,255,255,0.95);

      color: #333;

      padding: 12px 24px;

      border-radius: 999px;

      font-size: 17px;

      cursor: pointer;

      box-shadow: 0 3px 8px rgba(0,0,0,0.10);

    }


    .board-wrap {

      margin-top: 14px;

      flex: 1 1 auto;

      min-height: 0;

      width: min(68vw, 560px);

      display: flex;

      align-items: center;

      justify-content: center;

      position: relative;

    }


    .board {

      width: 100%;

      aspect-ratio: 1 / 1;

      max-height: 44vh;

      max-height: 44svh;

      border-radius: 18px;

      overflow: hidden;

      position: relative;

      border: 3px solid rgba(255,255,255,0.86);

      box-shadow:

        0 10px 30px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      background: rgba(160, 176, 208, 0.10);

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board img {

      width: 100%;

      height: 100%;

      object-fit: contain;

      display: block;

      filter: blur(38px) saturate(0.62) brightness(0.90);

      transform: scale(0.90);

      transform-origin: center center;

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),

        rgba(68, 93, 145, 0.04);

    }


    .admin-badge {

      position: absolute;

      top: 10px;

      right: 10px;

      z-index: 4;

      background: rgba(20,20,20,0.82);

      color: white;

      padding: 7px 10px;

      border-radius: 999px;

      font-size: 12px;

      letter-spacing: 0.3px;

      display: none;

    }


    .actions {

      margin-top: 14px;

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      justify-content: center;

    }


    .action-btn {

      border: 1px solid rgba(0,0,0,0.16);

      background: rgba(255,255,255,0.94);

      color: #3a3a3a;

      padding: 12px 22px;

      border-radius: 999px;

      font-size: 16px;

      cursor: pointer;

      box-shadow: 0 3px 8px rgba(0,0,0,0.08);

    }


    .socials {

      margin-top: 14px;

      display: flex;

      gap: 14px;

      justify-content: center;

      flex-wrap: wrap;

    }


    .social {

      width: 48px;

      height: 48px;

      border-radius: 50%;

      display: grid;

      place-items: center;

      font-weight: bold;

      font-size: 20px;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .instagram { background: linear-gradient(135deg, #ff5f6d, #ffc371, #833ab4); }

    .x { background: #111; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      margin-top: 12px;

      text-align: center;

      color: #6f6f6f;

      font-size: 15px;

      padding-bottom: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.90);

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 700px) {

      .content {

        padding: 14px 10px 10px;

      }


      .title {

        font-size: clamp(34px, 10vw, 54px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .buy-btn,

      .action-btn {

        font-size: 15px;

        padding: 11px 18px;

      }


      .board-wrap {

        width: 86vw;

      }


      .board {

        max-height: 40vh;

        max-height: 40svh;

      }


      .social {

        width: 44px;

        height: 44px;

        font-size: 18px;

      }


      .footer {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="progress-value">0%</div>


      <div class="progress">

        <div class="progress-bar"></div>

      </div>


      <button class="buy-btn">Buy Tiles</button>


      <div class="board-wrap">

        <div class="board">

          <div class="admin-badge">ADMIN MODE</div>

          <img src="swallow-artwork.png" alt="Swallow artwork preview">

        </div>

      </div>


      <div class="actions">

        <button class="action-btn">Share</button>

        <button class="action-btn">Find My Tile</button>

      </div>


      <div class="socials">

        <div class="social instagram">◎</div>

        <div class="social x">X</div>

        <div class="social tiktok">♪</div>

        <div class="social facebook">f</div>

      </div>


      <div class="footer">

        <a href="#">Terms &amp; Conditions</a>

        •

        <a href="#">Privacy Policy</a>

        •

        <span>© 2024 One Tile Project</span>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";


    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
