<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Tile Project</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:42px;
}

.tagline{
color:#cfcfcf;
margin-bottom:18px;
}

.progress{
width:300px;
height:10px;
background:#222;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ffffff;
}

.board{
position:relative;
width:80vmin;
height:80vmin;
margin:auto;
border-radius:20px;
overflow:hidden;
border:1px solid #333;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.art{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(14px);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.admin{
position:absolute;
top:10px;
right:10px;
background:#111;
padding:6px 10px;
border-radius:6px;
font-size:12px;
opacity:.7;
}

button{
margin-top:12px;
padding:10px 18px;
border-radius:20px;
border:none;
background:#ffffff;
color:#000;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>One Tile Project</h1>
<div class="tagline">Claim your tile. Leave your mark. Be part of digital history.</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<button>Buy Tiles</button>

<div class="board">

<img class="art" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAQACAIAAADwf7zUAAAgAElEQVR4nOzdeZhcV33/8d8hN..." />

<div class="overlay"></div>

<div class="admin">ADMIN PREVIEW</div>

</div>

</body>
</html>
