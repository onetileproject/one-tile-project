<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      background: #e9e5df;

      font-family: Arial, Helvetica, sans-serif;

    }


    body {

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .viewport {

      position: relative;

      width: 100vw;

      height: 100vh;

      overflow: hidden;

      display: flex;

      align-items: center;

      justify-content: center;

      background: url("page-background.png") center center / cover no-repeat;

    }


    .stage {

      position: absolute;

      width: 1440px;

      height: 1024px;

      transform-origin: center center;

    }


    .site {

      position: relative;

      width: 1440px;

      height: 1024px;

      background: transparent;

      overflow: hidden;

    }


    .title {

      position: absolute;

      top: 22px;

      left: 50%;

      transform: translateX(-50%);

      margin: 0;

      font-family: "Brush Script MT", "Segoe Script", "Lucida Handwriting", cursive;

      font-size: 92px;

      line-height: 1;

      font-weight: 700;

      color: #141414;

      white-space: nowrap;

      z-index: 5;

    }


    .tagline {

      position: absolute;

      top: 140px;

      left: 50%;

      transform: translateX(-50%);

      margin: 0;

      width: 900px;

      text-align: center;

      font-size: 21px;

      color: #313131;

      white-space: nowrap;

      z-index: 5;

    }


    .board-shell {

      position: absolute;

      top: 248px;

      left: 55px;

      width: 1330px;

      height: 388px;

      border-radius: 8px;

      overflow: hidden;

      background: rgba(243, 241, 238, 0.94);

      box-shadow:

        0 0 0 2px rgba(255,255,255,0.72),

        0 0 0 4px rgba(18,18,18,0.82),

        0 14px 18px rgba(0,0,0,0.18);

      z-index: 2;

    }


    #tileBoard {

      display: block;

      width: 100%;

      height: 100%;

    }


    .progress-plate {

      position: absolute;

      top: 660px;

      left: 50%;

      transform: translateX(-50%);

      width: 720px;

      height: 82px;

      border-radius: 24px;

      background:

        radial-gradient(circle at 12% 45%, rgba(0,0,0,0.95), rgba(0,0,0,0.72) 42%, rgba(0,0,0,0.0) 78%),

        radial-gradient(circle at 88% 45%, rgba(0,0,0,0.95), rgba(0,0,0,0.72) 42%, rgba(0,0,0,0.0) 78%),

        radial-gradient(circle at 50% 50%, rgba(18,18,18,0.98), rgba(18,18,18,0.88) 52%, rgba(18,18,18,0.0) 100%);

      filter: blur(0.4px);

      opacity: 0.98;

      z-index: 2;

    }


    .progress-wrap {

      position: absolute;

      top: 678px;

      left: 50%;

      transform: translateX(-50%);

      width: 610px;

      z-index: 4;

      pointer-events: none;

    }


    .progress-label {

      margin-bottom: 10px;

      text-align: center;

      color: #ffffff;

      font-size: 22px;

      font-weight: 800;

      letter-spacing: 0.02em;

      text-transform: uppercase;

      text-shadow: 0 1px 1px rgba(0,0,0,0.28);

    }


    .progress-label .sold {

      color: #f0bf34;

      font-size: 28px;

      font-style: italic;

    }


    .progress-bar {

      width: 100%;

      height: 12px;

      border-radius: 999px;

      background: rgba(255,255,255,0.25);

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(0,0,0,0.18);

    }


    .progress-fill {

      width: 0%;

      height: 100%;

      border-radius: 999px;

      background: linear-gradient(90deg, #dca50c, #f0bf34, #ffd65a);

    }


    .actions {

      position: absolute;

      top: 760px;

      left: 50%;

      transform: translateX(-50%);

      display: flex;

      gap: 22px;

      z-index: 4;

    }


    .pill-btn {

      border: 0;

      border-radius: 999px;

      height: 58px;

      padding: 0 28px;

      font-size: 18px;

      font-weight: 800;

      cursor: pointer;

      display: inline-flex;

      align-items: center;

      justify-content: center;

      gap: 12px;

      white-space: nowrap;

      box-shadow:

        inset 0 1px 1px rgba(255,255,255,0.18),

        0 8px 16px rgba(0,0,0,0.14);

    }


    .pill-btn.buy {

      min-width: 220px;

      color: #1d1d1d;

      background: linear-gradient(180deg, #ffd93d 0%, #efc11b 100%);

    }


    .pill-btn.dark {

      min-width: 210px;

      color: #ffffff;

      background: linear-gradient(180deg, #1b1b1b 0%, #101010 100%);

    }


    .footer-left {

      position: absolute;

      left: 88px;

      top: 902px;

      width: 390px;

      color: #111111;

      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;

      font-size: 24px;

      line-height: 1;

      text-transform: uppercase;

      white-space: nowrap;

      z-index: 4;

    }


    .footer-left::after {

      content: "";

      display: block;

      width: 100%;

      height: 7px;

      margin-top: 8px;

      background: #e8b01d;

      border-radius: 999px;

    }


    .footer-center {

      position: absolute;

      top: 900px;

      left: 50%;

      transform: translateX(-50%);

      width: 540px;

      text-align: center;

      color: #171717;

      z-index: 4;

    }


    .footer-center .line1 {

      font-size: 16px;

      white-space: nowrap;

    }


    .footer-center .line2 {

      margin-top: 8px;

      font-size: 26px;

      line-height: 1.05;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 700;

      white-space: nowrap;

    }


    .footer-socials {

      position: absolute;

      top: 892px;

      right: 108px;

      display: flex;

      gap: 16px;

      z-index: 4;

    }


    .social {

      width: 54px;

      height: 54px;

      border-radius: 14px;

      display: flex;

      align-items: center;

      justify-content: center;

      color: #fff;

      font-size: 24px;

      font-weight: 700;

      box-shadow: 0 8px 14px rgba(0,0,0,0.16);

      user-select: none;

    }


    .social.tiktok {

      background: #111111;

    }


    .social.instagram {

      background:

        radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);

    }


    .terms-link {

      position: absolute;

      bottom: 18px;

      left: 50%;

      transform: translateX(-50%);

      font-size: 14px;

      color: #1b1b1b;

      text-decoration: underline;

      z-index: 4;

      cursor: pointer;

      white-space: nowrap;

    }

  </style>

</head>

<body>

  <div class="viewport">

    <div class="stage" id="stage">

      <main class="site">

        <h1 class="title">The Tile Project</h1>


        <p class="tagline">Claim your tile. Leave your mark. Be part of digital history.</p>


        <div class="board-shell">

          <canvas id="tileBoard"></canvas>

        </div>


        <div class="progress-plate"></div>


        <div class="progress-wrap">

          <div class="progress-label">

            TILES SOLD: <span class="sold">0</span> / 60,000

          </div>

          <div class="progress-bar">

            <div class="progress-fill"></div>

          </div>

        </div>


        <div class="actions">

          <button class="pill-btn buy" type="button">🛒 BUY A TILE</button>

          <button class="pill-btn dark" type="button">⌕ FIND MY TILE</button>

          <button class="pill-btn dark" type="button">↗ SHARE</button>

        </div>


        <div class="footer-left">WHAT WILL THE FINAL ARTWORK BE?</div>


        <div class="footer-center">

          <div class="line1">60,000 Tiles, Create a Piece of Art.</div>

          <div class="line2">Take your tile. Leave your mark.</div>

        </div>


        <div class="footer-socials">

          <div class="social tiktok">♪</div>

          <div class="social instagram">◎</div>

        </div>


        <div class="terms-link">Terms and Conditions</div>

      </main>

    </div>

  </div>


  <script>

    const canvas = document.getElementById("tileBoard");

    const ctx = canvas.getContext("2d");

    const stage = document.getElementById("stage");


    const BASE_W = 1440;

    const BASE_H = 1024;

    const COLS = 250;

    const ROWS = 240;


    function scaleStage() {

      const vw = window.innerWidth;

      const vh = window.innerHeight;

      const scale = Math.min(vw / BASE_W, vh / BASE_H);

      stage.style.transform = `scale(${scale})`;

    }


    function resizeCanvas() {

      const rect = canvas.getBoundingClientRect();

      const dpr = window.devicePixelRatio || 1;


      canvas.width = Math.round(rect.width * dpr);

      canvas.height = Math.round(rect.height * dpr);


      ctx.setTransform(1, 0, 0, 1, 0, 0);

      ctx.scale(dpr, dpr);


      drawBoard(rect.width, rect.height);

    }


    function drawRoundedRect(x, y, w, h, r, fillStyle, strokeStyle, lineWidth = 1) {

      ctx.beginPath();

      ctx.moveTo(x + r, y);

      ctx.lineTo(x + w - r, y);

      ctx.quadraticCurveTo(x + w, y, x + w, y + r);

      ctx.lineTo(x + w, y + h - r);

      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);

      ctx.lineTo(x + r, y + h);

      ctx.quadraticCurveTo(x, y + h, x, y + h - r);

      ctx.lineTo(x, y + r);

      ctx.quadraticCurveTo(x, y, x + r, y);

      ctx.closePath();

      ctx.fillStyle = fillStyle;

      ctx.fill();

      if (strokeStyle) {

        ctx.strokeStyle = strokeStyle;

        ctx.lineWidth = lineWidth;

        ctx.stroke();

      }

    }


    function colorFromSeed(seed) {

      const palettes = [

        ["#5ab0ff", "#2e74ff", "#183153"],

        ["#ffcb3c", "#fb8500", "#3d2c00"],

        ["#ef476f", "#ff7aa2", "#41101f"],

        ["#00b4d8", "#90e0ef", "#123b48"],

        ["#8338ec", "#c77dff", "#2a1040"],

        ["#111111", "#5f5f5f", "#d9d9d9"]

      ];

      return palettes[seed % palettes.length];

    }


    function drawFakeImageTile(x, y, w, h, seed) {

      const [c1, c2, c3] = colorFromSeed(seed);


      drawRoundedRect(x, y, w, h, 2.5, "#f8f8f8", "rgba(0,0,0,0.12)", 0.4);


      const pad = Math.max(1, w * 0.06);

      const ix = x + pad;

      const iy = y + pad;

      const iw = w - pad * 2;

      const ih = h - pad * 2;


      const grad = ctx.createLinearGradient(ix, iy, ix + iw, iy + ih);

      grad.addColorStop(0, c1);

      grad.addColorStop(0.5, c2);

      grad.addColorStop(1, c3);


      drawRoundedRect(ix, iy, iw, ih, 1.8, grad, "rgba(255,255,255,0.35)", 0.25);


      ctx.strokeStyle = "rgba(255,255,255,0.55)";

      ctx.lineWidth = 0.45;

      ctx.beginPath();

      ctx.moveTo(ix + iw * 0.1, iy + ih * 0.82);

      ctx.lineTo(ix + iw * 0.45, iy + ih * 0.42);

      ctx.lineTo(ix + iw * 0.68, iy + ih * 0.62);

      ctx.lineTo(ix + iw * 0.92, iy + ih * 0.26);

      ctx.stroke();


      ctx.beginPath();

      ctx.arc(ix + iw * 0.26, iy + ih * 0.28, Math.max(0.8, iw * 0.08), 0, Math.PI * 2);

      ctx.fillStyle = "rgba(255,255,255,0.85)";

      ctx.fill();

    }


    function buildFilledCells() {

      const cells = [];


      for (let c = 0; c < COLS; c++) {

        if (c < 62 || c > 181) cells.push([c, 0]);

        if (c < 55 || c > 189) cells.push([c, 1]);

      }


      for (let r = 2; r < 62; r++) {

        const leftWidth = Math.max(6, 56 - r);

        const rightWidth = Math.max(6, 56 - r);


        for (let c = 0; c < leftWidth; c++) {

          if ((c + r) % 2 === 0 || c < 5) cells.push([c, r]);

        }


        for (let c = COLS - rightWidth; c < COLS; c++) {

          if ((c + r) % 2 === 1 || c > COLS - 6) cells.push([c, r]);

        }

      }


      for (let r = ROWS - 58; r < ROWS; r++) {

        const depth = ROWS - r;

        const leftWidth = Math.max(10, 68 - depth);

        const rightWidth = Math.max(10, 68 - depth);


        for (let c = 0; c < leftWidth; c++) {

          if ((c + r) % 2 === 0 || c < 4) cells.push([c, r]);

        }


        for (let c = COLS - rightWidth; c < COLS; c++) {

          if ((c + r) % 2 === 1 || c > COLS - 5) cells.push([c, r]);

        }

      }


      return cells;

    }


    function drawBoard(width, height) {

      ctx.clearRect(0, 0, width, height);


      ctx.fillStyle = "rgba(244,242,239,0.96)";

      ctx.fillRect(0, 0, width, height);


      const cw = width / COLS;

      const ch = height / ROWS;


      ctx.strokeStyle = "rgba(84,84,84,0.33)";

      ctx.lineWidth = 0.55;


      for (let i = 0; i <= COLS; i++) {

        const x = Math.round(i * cw) + 0.5;

        ctx.beginPath();

        ctx.moveTo(x, 0);

        ctx.lineTo(x, height);

        ctx.stroke();

      }


      for (let j = 0; j <= ROWS; j++) {

        const y = Math.round(j * ch) + 0.5;

        ctx.beginPath();

        ctx.moveTo(0, y);

        ctx.lineTo(width, y);

        ctx.stroke();

      }


      const filledCells = buildFilledCells();


      filledCells.forEach(([c, r], idx) => {

        const x = c * cw;

        const y = r * ch;

        drawFakeImageTile(x + 0.3, y + 0.3, cw - 0.6, ch - 0.6, idx + c + r);

      });

    }


    function init() {

      scaleStage();

      resizeCanvas();

    }


    window.addEventListener("resize", init);

    init();

  </script>

</body>

</html>
