<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    :root {

      --bg: #f7f4ee;

      --text: #333;

      --muted: #666;

      --button-bg: rgba(255, 255, 255, 0.96);

      --button-border: rgba(0, 0, 0, 0.16);

      --frame-border: rgba(255, 255, 255, 0.9);

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: var(--bg);

      color: var(--text);

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      overflow: hidden;

      position: relative;

      background-color: var(--bg);

      background-image: url("page-background.png");

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

    }


    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.08;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.4px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.4px);

      background-size: 26px 26px, 42px 42px;

      background-position: 0 0, 12px 14px;

    }


    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      height: 100%;

      max-width: 1400px;

      margin: 0 auto;

      padding: 18px 24px 10px;

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 6px;

    }


    .title {

      margin: 0;

      line-height: 1;

      text-align: center;

      font-size: clamp(44px, 6vw, 86px);

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #2168cb 0%, #7b39b8 42%, #d06f30 74%, #d84444 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

    }


    .tagline {

      margin: 0;

      text-align: center;

      font-size: clamp(17px, 1.8vw, 22px);

      color: #3d3d3d;

      max-width: 900px;

    }


    /* TOP RIGHT PANEL - έξω από το hero */

    .top-controls {

      position: fixed;

      top: 22px;

      right: 24px;

      display: flex;

      align-items: center;

      gap: 10px;

      z-index: 9999;

    }


    .progress-group {

      display: flex;

      align-items: center;

      gap: 10px;

      background: rgba(255,255,255,0.92);

      border: 1px solid rgba(0,0,0,0.12);

      border-radius: 999px;

      padding: 6px 12px;

      box-shadow: 0 4px 10px rgba(0,0,0,0.06);

    }


    .progress-number {

      font-size: 18px;

      font-weight: 600;

      color: #444;

      line-height: 1;

      min-width: 34px;

      text-align: right;

    }


    .progress-track {

      width: 180px;

      height: 10px;

      border: 1px solid rgba(0,0,0,0.42);

      border-radius: 999px;

      background: #fff;

      overflow: hidden;

    }


    .progress-fill {

      width: 0%;

      height: 100%;

      background: #4a4a4a;

      border-radius: 999px;

    }


    .buy-btn,

    .action-btn {

      border: 1px solid var(--button-border);

      background: var(--button-bg);

      color: #3a3a3a;

      border-radius: 999px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

      display: inline-flex;

      align-items: center;

      justify-content: center;

      gap: 8px;

      white-space: nowrap;

    }


    .buy-btn {

      padding: 11px 20px;

      font-size: 15px;

      font-weight: 600;

    }


    .hero {

      position: relative;

      width: min(1120px, 94vw);

      flex: 1 1 auto;

      min-height: 0;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;

      padding-top: 6px;

    }


    .board-wrap {

      width: min(62vw, 860px);

      aspect-ratio: 1.62 / 0.92;

      position: relative;

      display: flex;

      align-items: center;

      justify-content: center;

      margin-top: 0;

    }


    .board {

      width: 100%;

      height: 100%;

      position: relative;

      border-radius: 22px;

      overflow: hidden;

      border: 4px solid var(--frame-border);

      background: rgba(255,255,255,0.08);

      box-shadow:

        0 12px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      isolation: isolate;

    }


    board img {

  width: 100%;

  height: 100%;

  object-fit: contain;

  object-position: center;

  display: block;

  filter: none;

  transform: scale(0.92);

  transform-origin: center center;

}




   .board::before {

  content: "";

  position: absolute;

  inset: 0;

  z-index: 2;

  pointer-events: none;

  box-shadow:

    inset 0 0 110px rgba(255,255,255,0.72),

    inset 0 0 180px rgba(255,255,255,0.30);

}


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      z-index: 2;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.14), rgba(255,255,255,0.08)),

        rgba(255,255,255,0.18);

      backdrop-filter: blur(10px);

    }


    .admin-badge {

      position: absolute;

      top: 14px;

      right: 14px;

      z-index: 4;

      display: none;

      background: rgba(27,27,27,0.88);

      color: white;

      font-size: 12px;

      letter-spacing: 0.3px;

      padding: 8px 12px;

      border-radius: 999px;

    }


    .bottom-controls {

      margin-top: 8px;

      display: grid;

      justify-items: center;

      gap: 6px;

      z-index: 20;

    }


    .actions {

      display: flex;

      gap: 8px;

      justify-content: center;

      flex-wrap: wrap;

    }


    .action-btn {

      padding: 7px 12px;

      font-size: 12px;

      min-width: 94px;

    }


    .action-icon {

      width: 13px;

      height: 13px;

      flex: 0 0 auto;

      display: inline-block;

    }


    .socials {

      display: flex;

      gap: 10px;

      justify-content: center;

      flex-wrap: wrap;

    }


    .social {

      width: 32px;

      height: 32px;

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

      overflow: hidden;

    }


    .social svg {

      width: 14px;

      height: 14px;

      display: block;

    }


    .instagram {

      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);

    }


    .x { background: #0f1720; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      text-align: center;

      color: var(--muted);

      font-size: 12px;

      padding-bottom: 0;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.92);

    }


    body.admin-mode .board::before,

    body.admin-mode .board::after {

      display: none;

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 1100px) {

      .board-wrap {

        width: min(74vw, 840px);

      }

    }


    @media (max-width: 700px) {

      .content {

        padding: 14px 10px 10px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .hero {

        width: 95vw;

        padding-top: 10px;

      }


      .top-controls {

        top: 12px;

        right: 10px;

        gap: 8px;

      }


      .progress-group {

        padding: 5px 8px;

      }


      .progress-number {

        font-size: 15px;

      }


      .progress-track {

        width: 120px;

      }


      .buy-btn {

        font-size: 14px;

        padding: 9px 14px;

      }


      .board-wrap {

        width: 92vw;

        aspect-ratio: 1.54 / 0.84;

      }


      .action-btn {

        min-width: 90px;

        font-size: 11px;

        padding: 7px 10px;

      }


      .social {

        width: 30px;

        height: 30px;

      }


      .social svg {

        width: 13px;

        height: 13px;

      }


      .footer {

        font-size: 11px;

      }

    }

  </style>

</head>


<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="top-controls">

        <div class="progress-group">

          <div class="progress-number">0%</div>

          <div class="progress-track">

            <div class="progress-fill"></div>

          </div>

        </div>


        <button class="buy-btn">Buy Tiles</button>

      </div>


      <div class="hero">

        <div class="board-wrap">

          <div class="board">

            <div class="admin-badge">ADMIN MODE</div>

            <img src="swallow-artwork.png" alt="Swallow artwork preview">

          </div>

        </div>


        <div class="bottom-controls">

          <div class="actions">

            <button class="action-btn">

              <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <circle cx="18" cy="5" r="3"></circle>

                <circle cx="6" cy="12" r="3"></circle>

                <circle cx="18" cy="19" r="3"></circle>

                <path d="M8.6 13.5 15.4 17.5"></path>

                <path d="M15.4 6.5 8.6 10.5"></path>

              </svg>

              Share

            </button>


            <button class="action-btn">Find My Tile</button>

          </div>


          <div class="socials">

            <div class="social instagram" aria-label="Instagram">

              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>

                <circle cx="12" cy="12" r="4"></circle>

                <circle cx="17.5" cy="6.5" r="1"></circle>

              </svg>

            </div>


            <div class="social x" aria-label="X">

              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <path d="M4 4 20 20"></path>

                <path d="M20 4 4 20"></path>

              </svg>

            </div>


            <div class="social tiktok" aria-label="TikTok">

              <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">

                <path d="M14.5 3c.3 1.7 1.4 3.2 3 4.1 1 .5 2 .8 3.1.8V11c-1.4 0-2.8-.4-4.1-1.1v5.8a5.5 5.5 0 1 1-5.5-5.5c.3 0 .6 0 .9.1v3c-.3-.1-.6-.2-.9-.2a2.5 2.5 0 1 0 2.5 2.5V3h1z"></path>

              </svg>

            </div>


            <div class="social facebook" aria-label="Facebook">

              <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">

                <path d="M14 8h3V4h-3c-3 0-5 2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.7.3-1 1-1z"></path>

              </svg>

            </div>

          </div>


          <div class="footer">

            <a href="#">Terms &amp; Conditions</a>

            •

            <a href="#">Privacy Policy</a>

            •

            <span>© 2024 One Tile Project</span>

          </div>

        </div>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";


    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
