<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One Tile Project</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:40px;
}

.tagline{
color:#bdbdbd;
margin-bottom:20px;
}

.progress{
width:300px;
height:10px;
background:#222;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
}

.board{
position:relative;
width:80vmin;
height:80vmin;
margin:auto;
border-radius:20px;
overflow:hidden;
border:1px solid #333;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.art{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:blur(14px);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}

</style>
</head>

<body>

<h1>One Tile Project</h1>
<div class="tagline">Claim your tile. Leave your mark. Be part of digital history.</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="board">

<img class="art" src="a_digital_artwork_serves_as_a_template_for_the_on.png">

<div class="overlay"></div>

</div>

</body>
</html>
