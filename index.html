<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    :root {

      --bg: #f7f4ee;

      --text: #333333;

      --muted: #666666;

      --line: rgba(0, 0, 0, 0.18);

      --soft-line: rgba(255, 255, 255, 0.88);

      --button-bg: rgba(255, 255, 255, 0.96);

      --shadow: 0 10px 24px rgba(0, 0, 0, 0.12);

    }


    html,

    body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: var(--bg);

      color: var(--text);

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      height: 100svh;

      overflow: hidden;

      position: relative;

      background-color: var(--bg);

      background-image: url("page-background.png");

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

    }


    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.08;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.4px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.4px);

      background-size: 26px 26px, 42px 42px;

      background-position: 0 0, 12px 14px;

    }


    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      height: 100%;

      max-width: 1400px;

      margin: 0 auto;

      padding: 18px 24px 10px;

      display: grid;

      grid-template-rows: auto auto auto 1fr auto auto auto;

      justify-items: center;

      align-items: start;

      gap: 10px;

    }


    .title {

      margin: 0;

      line-height: 1;

      text-align: center;

      font-size: clamp(44px, 6vw, 86px);

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #2168cb 0%, #7b39b8 42%, #d06f30 74%, #d84444 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

    }


    .tagline {

      margin: 0;

      text-align: center;

      font-size: clamp(17px, 1.8vw, 22px);

      color: #3d3d3d;

      max-width: 900px;

    }


    .top-controls {

      width: min(980px, 92vw);

      display: flex;

      justify-content: flex-end;

      align-items: center;

      gap: 12px;

      margin-top: 2px;

    }


    .progress-group {

      display: flex;

      align-items: center;

      gap: 10px;

      background: rgba(255, 255, 255, 0.72);

      padding: 4px 10px;

      border-radius: 999px;

      border: 1px solid rgba(0,0,0,0.08);

      backdrop-filter: blur(2px);

    }


    .progress-number {

      font-size: 18px;

      color: #444;

      line-height: 1;

      min-width: 34px;

      text-align: right;

    }


    .progress-track {

      width: 180px;

      height: 10px;

      border-radius: 999px;

      border: 1px solid rgba(0,0,0,0.32);

      background: #ffffff;

      overflow: hidden;

    }


    .progress-fill {

      width: 0%;

      height: 100%;

      background: #4c4c4c;

      border-radius: 999px;

    }


    .buy-btn,

    .action-btn {

      border: 1px solid var(--line);

      background: var(--button-bg);

      color: #3a3a3a;

      border-radius: 999px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    }


    .buy-btn {

      padding: 12px 26px;

      font-size: 16px;

    }


    .board-area {

      width: 100%;

      height: 100%;

      min-height: 0;

      display: flex;

      align-items: center;

      justify-content: center;

      margin-top: -4px;

    }


    .board-wrap {

      position: relative;

      width: min(72vw, 1000px);

      aspect-ratio: 1.62 / 0.82;

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board {

      position: relative;

      width: 100%;

      height: 100%;

      border-radius: 22px;

      overflow: hidden;

      border: 4px solid var(--soft-line);

      box-shadow:

        0 12px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      background: rgba(255,255,255,0.08);

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board img {

      width: 100%;

      height: 100%;

      object-fit: cover;

      object-position: center;

      display: block;

      filter: blur(28px) saturate(0.72) brightness(0.94);

      transform: scale(0.94);

      transform-origin: center center;

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),

        rgba(62,88,140,0.03);

    }


    .admin-badge {

      position: absolute;

      top: 14px;

      right: 14px;

      display: none;

      z-index: 3;

      background: rgba(27, 27, 27, 0.88);

      color: white;

      font-size: 12px;

      letter-spacing: 0.3px;

      padding: 8px 12px;

      border-radius: 999px;

    }


    .actions {

      display: flex;

      gap: 16px;

      justify-content: center;

      flex-wrap: wrap;

      margin-top: -2px;

    }


    .action-btn {

      padding: 13px 28px;

      font-size: 16px;

      min-width: 140px;

    }


    .socials {

      display: flex;

      gap: 18px;

      justify-content: center;

      flex-wrap: wrap;

      margin-top: 2px;

    }


    .social {

      width: 52px;

      height: 52px;

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      color: white;

      font-size: 22px;

      font-weight: bold;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .instagram {

      background: linear-gradient(135deg, #ff5f6d, #ffc371, #833ab4);

    }


    .x {

      background: #0f1720;

    }


    .tiktok {

      background: #101010;

    }


    .facebook {

      background: #1877f2;

    }


    .footer {

      text-align: center;

      color: var(--muted);

      font-size: 14px;

      padding-bottom: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.90);

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 1100px) {

      .board-wrap {

        width: min(82vw, 920px);

      }


      .top-controls {

        width: min(920px, 92vw);

      }

    }


    @media (max-width: 700px) {

      .content {

        padding: 14px 10px 10px;

        gap: 8px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .top-controls {

        width: 94vw;

        justify-content: center;

        flex-wrap: wrap;

        gap: 10px;

      }


      .progress-group {

        padding: 4px 8px;

      }


      .progress-number {

        font-size: 16px;

      }


      .progress-track {

        width: 120px;

      }


      .buy-btn {

        font-size: 14px;

        padding: 10px 18px;

      }


      .board-wrap {

        width: 92vw;

        aspect-ratio: 1.54 / 0.90;

      }


      .action-btn {

        min-width: 120px;

        font-size: 14px;

        padding: 11px 18px;

      }


      .social {

        width: 46px;

        height: 46px;

        font-size: 19px;

      }


      .footer {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="top-controls">

        <div class="progress-group">

          <div class="progress-number">0%</div>

          <div class="progress-track">

            <div class="progress-fill"></div>

          </div>

        </div>


        <button class="buy-btn">Buy Tiles</button>

      </div>


      <div class="board-area">

        <div class="board-wrap">

          <div class="board">

            <div class="admin-badge">ADMIN MODE</div>

            <img src="swallow-artwork.png" alt="Swallow artwork preview">

          </div>

        </div>

      </div>


      <div class="actions">

        <button class="action-btn">Share</button>

        <button class="action-btn">Find My Tile</button>

      </div>


      <div class="socials">

        <div class="social instagram">◎</div>

        <div class="social x">X</div>

        <div class="social tiktok">♪</div>

        <div class="social facebook">f</div>

      </div>


      <div class="footer">

        <a href="#">Terms &amp; Conditions</a>

        •

        <a href="#">Privacy Policy</a>

        •

        <span>© 2024 One Tile Project</span>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";


    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
