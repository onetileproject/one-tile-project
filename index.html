<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    :root {

      --bg: #f7f4ee;

      --text: #333;

      --muted: #666;

      --button-bg: rgba(255, 255, 255, 0.96);

      --button-border: rgba(0, 0, 0, 0.16);

      --frame-border: rgba(255, 255, 255, 0.90);

      --art-ratio: 1 / 1;

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: var(--bg);

      color: var(--text);

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      overflow: hidden;

      position: relative;

      background-color: var(--bg);

      background-image: url("page-background.png");

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

    }


    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.08;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.4px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.4px);

      background-size: 26px 26px, 42px 42px;

      background-position: 0 0, 12px 14px;

    }


    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      height: 100%;

      max-width: 1440px;

      margin: 0 auto;

      padding: 16px 24px 14px;

      display: grid;

      grid-template-rows: auto auto 1fr;

      justify-items: center;

      align-items: start;

      gap: 8px;

    }


    .title {

      margin: 0;

      line-height: 1;

      text-align: center;

      font-size: clamp(44px, 6vw, 86px);

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #2168cb 0%, #7b39b8 42%, #d06f30 74%, #d84444 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

    }


    .tagline {

      margin: 0;

      text-align: center;

      font-size: clamp(17px, 1.8vw, 22px);

      color: #3d3d3d;

      max-width: 900px;

    }


    .hero {

      width: min(1280px, 96vw);

      height: 100%;

      min-height: 0;

      display: grid;

      grid-template-columns: minmax(0, 1fr) 250px;

      align-items: center;

      justify-content: center;

      gap: 28px;

      padding-top: 4px;

    }


    .art-column {

      min-width: 0;

      height: 100%;

      display: flex;

      align-items: center;

      justify-content: center;

    }


    /* Το frame ακολουθεί την αναλογία της εικόνας */

    .board-wrap {

      width: min(68vh, 68vw, 820px);

      aspect-ratio: var(--art-ratio);

      max-height: 72vh;

      position: relative;

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board {

      width: 100%;

      height: 100%;

      position: relative;

      display: flex;

      align-items: center;

      justify-content: center;

      border-radius: 24px;

      overflow: hidden;

      border: 4px solid var(--frame-border);

      background: rgba(255,255,255,0.12);

      box-shadow:

        0 12px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      isolation: isolate;

    }


    /* Η εικόνα φαίνεται ΟΛΟΚΛΗΡΗ */

    .board img {

      width: 100%;

      height: 100%;

      object-fit: contain;

      object-position: center;

      display: block;

      filter: none;

      transform: none;

    }


    /* blur veil μόνο για public */

    .board::before {

      content: "";

      position: absolute;

      inset: 0;

      z-index: 2;

      pointer-events: none;

      box-shadow:

        inset 0 0 110px rgba(255,255,255,0.72),

        inset 0 0 180px rgba(255,255,255,0.30);

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      z-index: 2;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.14), rgba(255,255,255,0.08)),

        rgba(255,255,255,0.18);

      backdrop-filter: blur(10px);

    }


    .admin-badge {

      position: absolute;

      top: 14px;

      right: 14px;

      z-index: 4;

      display: none;

      background: rgba(27,27,27,0.88);

      color: white;

      font-size: 12px;

      letter-spacing: 0.3px;

      padding: 8px 12px;

      border-radius: 999px;

    }


    .side-panel {

      align-self: center;

      display: flex;

      flex-direction: column;

      justify-content: center;

      gap: 14px;

      min-width: 0;

    }


    .progress-group {

      display: flex;

      align-items: center;

      gap: 10px;

      background: rgba(255,255,255,0.92);

      border: 1px solid rgba(0,0,0,0.12);

      border-radius: 999px;

      padding: 7px 12px;

      box-shadow: 0 4px 10px rgba(0,0,0,0.06);

    }


    .progress-number {

      font-size: 18px;

      font-weight: 600;

      color: #444;

      line-height: 1;

      min-width: 34px;

      text-align: right;

    }


    .progress-track {

      flex: 1;

      min-width: 120px;

      height: 10px;

      border: 1px solid rgba(0,0,0,0.42);

      border-radius: 999px;

      background: #fff;

      overflow: hidden;

    }


    .progress-fill {

      width: 0%;

      height: 100%;

      background: #4a4a4a;

      border-radius: 999px;

    }


    .buy-btn,

    .action-btn {

      width: 100%;

      border: 1px solid var(--button-border);

      background: var(--button-bg);

      color: #3a3a3a;

      border-radius: 999px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

      display: inline-flex;

      align-items: center;

      justify-content: center;

      gap: 8px;

      white-space: nowrap;

    }


    .buy-btn {

      padding: 11px 20px;

      font-size: 15px;

      font-weight: 600;

    }


    .action-btn {

      padding: 10px 14px;

      font-size: 13px;

    }


    .action-icon {

      width: 13px;

      height: 13px;

      flex: 0 0 auto;

      display: inline-block;

    }


    .socials {

      display: flex;

      gap: 10px;

      justify-content: flex-start;

      flex-wrap: wrap;

      padding-top: 2px;

    }


    .social {

      width: 34px;

      height: 34px;

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

      overflow: hidden;

      flex: 0 0 auto;

    }


    .social svg {

      width: 15px;

      height: 15px;

      display: block;

    }


    .instagram {

      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);

    }


    .x { background: #0f1720; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      color: var(--muted);

      font-size: 12px;

      line-height: 1.45;

      padding-top: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

    }


    body.admin-mode .board::before,

    body.admin-mode .board::after {

      display: none;

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 1000px) {

      .hero {

        grid-template-columns: 1fr;

        gap: 18px;

        justify-items: center;

      }


      .board-wrap {

        width: min(82vw, 72vh);

        max-height: 60vh;

      }


      .side-panel {

        width: min(420px, 92vw);

      }


      .socials {

        justify-content: center;

      }


      .footer {

        text-align: center;

      }

    }


    @media (max-width: 700px) {

      .content {

        padding: 12px 10px 10px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .board-wrap {

        width: min(88vw, 58vh);

      }


      .progress-number {

        font-size: 15px;

      }


      .buy-btn,

      .action-btn {

        font-size: 12px;

      }


      .social {

        width: 30px;

        height: 30px;

      }


      .social svg {

        width: 13px;

        height: 13px;

      }


      .footer {

        font-size: 11px;

      }

    }

  </style>

</head>


<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="hero">

        <div class="art-column">

          <div class="board-wrap">

            <div class="board">

              <div class="admin-badge">ADMIN MODE</div>

              <img id="artwork" src="swallow-artwork.png" alt="Swallow artwork preview">

            </div>

          </div>

        </div>


        <aside class="side-panel">

          <div class="progress-group">

            <div class="progress-number">0%</div>

            <div class="progress-track">

              <div class="progress-fill"></div>

            </div>

          </div>


          <button class="buy-btn">Buy Tiles</button>


          <button class="action-btn">

            <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

              <circle cx="18" cy="5" r="3"></circle>

              <circle cx="6" cy="12" r="3"></circle>

              <circle cx="18" cy="19" r="3"></circle>

              <path d="M8.6 13.5 15.4 17.5"></path>

              <path d="M15.4 6.5 8.6 10.5"></path>

            </svg>

            Share

          </button>


          <button class="action-btn">Find My Tile</button>


          <div class="socials">

            <div class="social instagram" aria-label="Instagram">

              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>

                <circle cx="12" cy="12" r="4"></circle>

                <circle cx="17.5" cy="6.5" r="1"></circle>

              </svg>

            </div>


            <div class="social x" aria-label="X">

              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <path d="M4 4 20 20"></path>

                <path d="M20 4 4 20"></path>

              </svg>

            </div>


            <div class="social tiktok" aria-label="TikTok">

              <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">

                <path d="M14.5 3c.3 1.7 1.4 3.2 3 4.1 1 .5 2 .8 3.1.8V11c-1.4 0-2.8-.4-4.1-1.1v5.8a5.5 5.5 0 1 1-5.5-5.5c.3 0 .6 0 .9.1v3c-.3-.1-.6-.2-.9-.2a2.5 2.5 0 1 0 2.5 2.5V3h1z"></path>

              </svg>

            </div>


            <div class="social facebook" aria-label="Facebook">

              <svg viewBox="0 0 24 24" fill="white" aria-hidden="true">

                <path d="M14 8h3V4h-3c-3 0-5 2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.7.3-1 1-1z"></path>

              </svg>

            </div>

          </div>


          <div class="footer">

            <a href="#">Terms &amp; Conditions</a>

            •

            <a href="#">Privacy Policy</a>

            •

            <span>© 2024 One Tile Project</span>

          </div>

        </aside>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";

    if (isAdmin) document.body.classList.add("admin-mode");


    const artwork = document.getElementById("artwork");

    const root = document.documentElement;


    function setArtworkRatio() {

      if (!artwork || !artwork.naturalWidth || !artwork.naturalHeight) return;

      const ratio = artwork.naturalWidth / artwork.naturalHeight;

      root.style.setProperty("--art-ratio", ratio);

    }


    if (artwork.complete) {

      setArtworkRatio();

    } else {

      artwork.addEventListener("load", setArtworkRatio);

    }

  </script>

</body>

</html>
