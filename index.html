<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One Tile Project</title>

<style>

body{
margin:0;
background:#0e0e0e;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

h1{
margin-top:30px;
font-size:36px;
}

p{
color:#bfbfbf;
margin-bottom:30px;
}

.artboard{
margin:40px auto 60px auto;
width:min(92vw,1100px);
aspect-ratio:1/1;
background:radial-gradient(circle at center,#1a1a1a 0%,#101010 55%,#0b0b0b 100%);
border:1px solid #222;
border-radius:24px;
box-shadow:0 0 40px rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

.grid{
width:min(78vw,760px);
display:grid;
grid-template-columns:repeat(40,1fr);
gap:1px;
}

.tile{
width:100%;
aspect-ratio:1/1;
background:#1c1c1c;
border-radius:8px;
cursor:pointer;
transition:0.2s;
opacity:0.92;
}

.tile:hover{
background:#2c2c2c;
}

</style>
</head>

<body>

<h1>One Tile Project</h1>

<p>Claim your tile. Leave your mark and be part of digital history.</p>

<div class="artboard">

<div class="grid">

<script>

for(let i=0;i<1600;i++){

document.write('<div class="tile"></div>')

}

</script>

</div>

</div>

</body>
</html>
