<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: #f7f4ee;

      color: #222;

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      height: 100svh;

      overflow: hidden;

      position: relative;

      background: #f7f4ee;

    }


    /* χαρτί / texture */

    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.14;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.5px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.5px);

      background-size: 28px 28px, 44px 44px;

      background-position: 0 0, 12px 16px;

    }


    .content {

      position: relative;

      z-index: 3;

      width: 100%;

      height: 100%;

      max-width: 1280px;

      margin: 0 auto;

      display: flex;

      flex-direction: column;

      align-items: center;

      padding: 18px 18px 10px;

    }


    .title {

      margin: 0;

      font-size: clamp(44px, 6vw, 86px);

      line-height: 1;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #1f67cb 0%, #7a39b7 42%, #d16f31 72%, #d74444 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

      text-align: center;

    }


    .tagline {

      margin: 10px 0 12px;

      font-size: clamp(17px, 1.8vw, 22px);

      color: #3c3c3c;

      text-align: center;

      max-width: 920px;

    }


    .progress-value {

      font-size: 16px;

      color: #4a4a4a;

      margin-bottom: 8px;

    }


    .progress {

      width: min(340px, 76vw);

      height: 12px;

      border-radius: 999px;

      background: #d8d8d8;

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);

    }


    .progress-bar {

      width: 0%;

      height: 100%;

      background: linear-gradient(90deg, #7ea7f2 0%, #5b80d8 100%);

      border-radius: 999px;

    }


    .buy-btn {

      margin-top: 14px;

      border: 1px solid rgba(0,0,0,0.20);

      background: rgba(255,255,255,0.96);

      color: #333;

      padding: 12px 24px;

      border-radius: 999px;

      font-size: 16px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .board-area {

      margin-top: 14px;

      flex: 1 1 auto;

      min-height: 0;

      width: 100%;

      display: flex;

      align-items: center;

      justify-content: center;

      position: relative;

    }


    /* ΠΙΤΣΙΛΙΕΣ ΓΥΡΩ ΑΠΟ ΤΟ BOARD - ΚΑΘΑΡΕΣ, ΟΧΙ BLUR */

    .splash-cloud {

      position: absolute;

      width: min(92vw, 1120px);

      aspect-ratio: 1.45 / 0.95;

      pointer-events: none;

      z-index: 1;

      background:

        radial-gradient(circle at 14% 48%, rgba(63,133,255,0.95) 0 3%, transparent 8%),

        radial-gradient(circle at 18% 57%, rgba(255,169,45,0.95) 0 3.6%, transparent 8%),

        radial-gradient(circle at 24% 68%, rgba(145,88,255,0.88) 0 3.2%, transparent 8%),

        radial-gradient(circle at 28% 78%, rgba(255,110,70,0.72) 0 2.2%, transparent 7%),


        radial-gradient(circle at 80% 50%, rgba(255,109,38,0.96) 0 3.2%, transparent 8%),

        radial-gradient(circle at 84% 60%, rgba(63,197,255,0.95) 0 3.6%, transparent 8%),

        radial-gradient(circle at 75% 70%, rgba(255,211,82,0.92) 0 3.1%, transparent 8%),

        radial-gradient(circle at 70% 80%, rgba(131,102,255,0.70) 0 2.3%, transparent 7%),


        radial-gradient(circle at 21% 62%, rgba(255,255,255,0.65) 0 1.1%, transparent 3%),

        radial-gradient(circle at 76% 64%, rgba(255,255,255,0.65) 0 1.1%, transparent 3%),


        radial-gradient(circle at 12% 60%, rgba(0,0,0,0.16) 0 0.4%, transparent 1.2%),

        radial-gradient(circle at 85% 63%, rgba(0,0,0,0.16) 0 0.4%, transparent 1.2%),


        radial-gradient(circle at 16% 52%, rgba(89,162,255,0.50) 0 8%, transparent 15%),

        radial-gradient(circle at 23% 70%, rgba(255,178,70,0.48) 0 8%, transparent 15%),

        radial-gradient(circle at 78% 55%, rgba(255,118,52,0.50) 0 8%, transparent 15%),

        radial-gradient(circle at 75% 72%, rgba(58,191,255,0.48) 0 8%, transparent 15%);

      opacity: 1;

    }


    .board-wrap {

      width: min(64vmin, 560px);

      height: min(64vmin, 560px);

      display: flex;

      align-items: center;

      justify-content: center;

      position: relative;

      z-index: 2;

    }


    .board {

      width: 100%;

      height: 100%;

      border-radius: 18px;

      overflow: hidden;

      position: relative;

      border: 3px solid rgba(255,255,255,0.88);

      box-shadow:

        0 12px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      background: linear-gradient(180deg, rgba(103,131,184,0.12), rgba(82,108,158,0.08));

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board img {

      width: 100%;

      height: 100%;

      object-fit: contain;

      display: block;

      filter: blur(34px) saturate(0.66) brightness(0.92);

      transform: scale(0.94);

      transform-origin: center center;

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),

        rgba(62, 88, 140, 0.04);

    }


    .admin-badge {

      position: absolute;

      top: 10px;

      right: 10px;

      z-index: 4;

      background: rgba(20,20,20,0.84);

      color: white;

      padding: 7px 10px;

      border-radius: 999px;

      font-size: 12px;

      letter-spacing: 0.3px;

      display: none;

    }


    .actions {

      margin-top: 14px;

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      justify-content: center;

    }


    .action-btn {

      border: 1px solid rgba(0,0,0,0.18);

      background: rgba(255,255,255,0.96);

      color: #3a3a3a;

      padding: 12px 22px;

      border-radius: 999px;

      font-size: 16px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    }


    .socials {

      margin-top: 14px;

      display: flex;

      gap: 14px;

      justify-content: center;

      flex-wrap: wrap;

    }


    .social {

      width: 48px;

      height: 48px;

      border-radius: 50%;

      display: grid;

      place-items: center;

      font-weight: bold;

      font-size: 20px;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .instagram { background: linear-gradient(135deg, #ff5f6d, #ffc371, #833ab4); }

    .x { background: #111; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      margin-top: 12px;

      text-align: center;

      color: #6f6f6f;

      font-size: 15px;

      padding-bottom: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.94);

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 700px) {

      .content {

        padding: 16px 10px 10px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .buy-btn,

      .action-btn {

        font-size: 14px;

        padding: 10px 16px;

      }


      .board-wrap {

        width: min(76vmin, 88vw);

        height: min(76vmin, 88vw);

      }


      .splash-cloud {

        width: 100vw;

      }


      .social {

        width: 44px;

        height: 44px;

        font-size: 18px;

      }


      .footer {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="progress-value">0%</div>


      <div class="progress">

        <div class="progress-bar"></div>

      </div>


      <button class="buy-btn">Buy Tiles</button>


      <div class="board-area">

        <div class="splash-cloud"></div>


        <div class="board-wrap">

          <div class="board">

            <div class="admin-badge">ADMIN MODE</div>

            <img src="swallow-artwork.png" alt="Swallow artwork preview">

          </div>

        </div>

      </div>


      <div class="actions">

        <button class="action-btn">Share</button>

        <button class="action-btn">Find My Tile</button>

      </div>


      <div class="socials">

        <div class="social instagram">◎</div>

        <div class="social x">X</div>

        <div class="social tiktok">♪</div>

        <div class="social facebook">f</div>

      </div>


      <div class="footer">

        <a href="#">Terms &amp; Conditions</a>

        •

        <a href="#">Privacy Policy</a>

        •

        <span>© 2024 One Tile Project</span>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";

    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
