<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Tile Project</title>

<style>
* { box-sizing: border-box; }

html, body {
margin: 0;
width: 100%;
height: 100%;
overflow: hidden;
font-family: Arial, Helvetica, sans-serif;
background: #0a0a0a;
color: #fff;
}

body {
display: flex;
align-items: center;
justify-content: center;
background:
radial-gradient(circle at 50% 20%, #1e1e1e 0%, #101010 45%, #070707 100%);
}

.page {
width: 100vw;
height: 100vh;
height: 100svh;
display: flex;
flex-direction: column;
padding: 14px;
gap: 10px;
overflow: hidden;
}

.header {
flex: 0 0 auto;
text-align: center;
}

.header h1 {
margin: 0 0 8px 0;
font-size: clamp(30px, 4vw, 46px);
line-height: 1.05;
color: #f7f7f7;
text-shadow: 0 0 18px rgba(255,255,255,0.08);
}

.header p {
margin: 0 0 14px 0;
font-size: clamp(13px, 1.5vw, 17px);
color: #d2d2d2;
}

.topbar {
width: min(96vw, 1100px);
margin: 0 auto;
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
flex-wrap: wrap;
}

.progress-wrap {
width: min(440px, 70vw);
text-align: left;
}

.progress-label {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 12px;
color: #cfcfcf;
margin-bottom: 6px;
}

.progress-bar {
width: 100%;
height: 12px;
border-radius: 999px;
background: rgba(255,255,255,0.10);
overflow: hidden;
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
}

.progress-fill {
width: 12%;
height: 100%;
border-radius: 999px;
background: linear-gradient(90deg, #d9d9d9 0%, #ffffff 100%);
box-shadow: 0 0 18px rgba(255,255,255,0.18);
}

.buy-btn {
border: 0;
border-radius: 999px;
padding: 12px 22px;
font-size: 15px;
font-weight: bold;
cursor: pointer;
color: #111;
background: #f2f2f2;
box-shadow: 0 8px 24px rgba(255,255,255,0.10);
transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.buy-btn:hover {
transform: translateY(-1px);
background: #ffffff;
box-shadow: 0 10px 28px rgba(255,255,255,0.16);
}

.board-wrap {
flex: 1 1 auto;
min-height: 0;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.artboard {
position: relative;
width: min(96vw, 1100px);
aspect-ratio: 1 / 1;
max-height: calc(100vh - 150px);
max-height: calc(100svh - 150px);
border-radius: 26px;
overflow: hidden;
border: 1px solid rgba(255,255,255,0.10);
background:
radial-gradient(circle at 50% 45%, rgba(255,255,255,0.10), transparent 22%),
radial-gradient(circle at center, #1f1f1f 0%, #141414 45%, #0b0b0b 100%);
box-shadow:
inset 0 0 0 1px rgba(255,255,255,0.03),
0 0 60px rgba(0,0,0,0.40);
}

.artboard::before {
content: "";
position: absolute;
inset: 0;
pointer-events: none;
background:
radial-gradient(circle at 50% 50%, rgba(255,255,255,0.07), transparent 26%),
radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 48%);
}

canvas {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
display: block;
}

.hint {
position: absolute;
left: 50%;
bottom: 14px;
transform: translateX(-50%);
font-size: 12px;
color: rgba(255,255,255,0.72);
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.08);
padding: 8px 12px;
border-radius: 999px;
backdrop-filter: blur(6px);
user-select: none;
pointer-events: none;
white-space: nowrap;
}

@media (max-width: 700px) {
.page {
padding: 10px;
gap: 8px;
}

.artboard {
width: 96vw;
max-height: calc(100vh - 180px);
max-height: calc(100svh - 180px);
border-radius: 18px;
}

.hint {
font-size: 10px;
bottom: 10px;
padding: 7px 10px;
}

.buy-btn {
padding: 11px 18px;
font-size: 14px;
}
}
</style>
</head>
<body>
<div class="page">
<div class="header">
<h1>One Tile Project</h1>
<p>Claim your tile. Leave your mark. Be part of digital history.</p>
</div>

<div class="topbar">
<div class="progress-wrap">
<div class="progress-label">
<span>Project Progress</span>
<span>12%</span>
</div>
<div class="progress-bar">
<div class="progress-fill"></div>
</div>
</div>

<button class="buy-btn" type="button">Buy Tiles</button>
</div>

<div class="board-wrap">
<div class="artboard">
<canvas id="board" width="1000" height="1000"></canvas>
<div class="hint">The swallow is revealed tile by tile</div>
</div>
</div>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const W = 1000;
const H = 1000;
const TARGET_TILES = 50000;

function roundedRect(c, x, y, w, h, r) {
const rr = Math.min(r, w / 2, h / 2);
c.beginPath();
c.moveTo(x + rr, y);
c.lineTo(x + w - rr, y);
c.quadraticCurveTo(x + w, y, x + w, y + rr);
c.lineTo(x + w, y + h - rr);
c.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
c.lineTo(x + rr, y + h);
c.quadraticCurveTo(x, y + h, x, y + h - rr);
c.lineTo(x, y + rr);
c.quadraticCurveTo(x, y, x + rr, y);
c.closePath();
}

function swallowShapePath(c) {
c.beginPath();

c.moveTo(500, 305);

c.bezierCurveTo(470, 250, 410, 205, 345, 182);
c.bezierCurveTo(290, 163, 220, 153, 128, 154);
c.bezierCurveTo(176, 188, 221, 226, 267, 274);
c.bezierCurveTo(211, 285, 154, 309, 106, 350);
c.bezierCurveTo(170, 347, 236, 358, 300, 383);
c.bezierCurveTo(243, 421, 196, 471, 169, 531);
c.bezierCurveTo(228, 510, 292, 503, 352, 510);
c.bezierCurveTo(324, 572, 320, 641, 338, 710);
c.bezierCurveTo(396, 658, 452, 616, 500, 564);
c.bezierCurveTo(548, 616, 604, 658, 662, 710);
c.bezierCurveTo(680, 641, 676, 572, 648, 510);
c.bezierCurveTo(708, 503, 772, 510, 831, 531);
c.bezierCurveTo(804, 471, 757, 421, 700, 383);
c.bezierCurveTo(764, 358, 830, 347, 894, 350);
c.bezierCurveTo(846, 309, 789, 285, 733, 274);
c.bezierCurveTo(779, 226, 824, 188, 872, 154);
c.bezierCurveTo(780, 153, 710, 163, 655, 182);
c.bezierCurveTo(590, 205, 530, 250, 500, 305);

c.bezierCurveTo(478, 365, 470, 420, 473, 486);
c.bezierCurveTo(457, 598, 402, 741, 277, 920);
c.bezierCurveTo(368, 878, 447, 792, 500, 688);
c.bezierCurveTo(553, 792, 632, 878, 723, 920);
c.bezierCurveTo(598, 741, 543, 598, 527, 486);
c.bezierCurveTo(530, 420, 522, 365, 500, 305);

c.closePath();
}

function branchStrokePath(c) {
c.beginPath();
c.moveTo(514, 319);
c.bezierCurveTo(555, 313, 595, 306, 634, 292);
c.bezierCurveTo(669, 280, 703, 262, 736, 238);
}

function pointInLeaf(px, py, cx, cy, rx, ry, rot) {
const cos = Math.cos(-rot);
const sin = Math.sin(-rot);
const dx = px - cx;
const dy = py - cy;
const ex = dx * cos - dy * sin;
const ey = dx * sin + dy * cos;
return (ex * ex) / (rx * rx) + (ey * ey) / (ry * ry) <= 1;
}

function distancePointToSegment(px, py, x1, y1, x2, y2) {
const dx = x2 - x1;
const dy = y2 - y1;
const lenSq = dx * dx + dy * dy;
let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
t = Math.max(0, Math.min(1, t));
const sx = x1 + t * dx;
const sy = y1 + t * dy;
const ox = px - sx;
const oy = py - sy;
return Math.sqrt(ox * ox + oy * oy);
}

const swallowPath = new Path2D();
swallowShapePath(swallowPath);

function inSwallow(x, y) {
return ctx.isPointInPath(swallowPath, x, y);
}

function inBranch(x, y) {
const stem =
distancePointToSegment(x, y, 514, 319, 634, 292) <= 10 ||
distancePointToSegment(x, y, 634, 292, 736, 238) <= 10;

const leaves =
pointInLeaf(x, y, 603, 286, 14, 29, -0.55) ||
pointInLeaf(x, y, 640, 272, 13, 27, 0.10) ||
pointInLeaf(x, y, 680, 255, 14, 30, -0.55) ||
pointInLeaf(x, y, 715, 236, 13, 27, 0.20);

return stem || leaves;
}

function inShape(x, y) {
return inSwallow(x, y) || inBranch(x, y);
}

function mulberry32(seed) {
return function() {
let t = seed += 0x6D2B79F5;
t = Math.imul(t ^ (t >>> 15), t | 1);
t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
};
}

function generateTiles() {
const rand = mulberry32(20260311);
const candidates = [];

const cols = 430;
const rows = 430;
const stepX = W / cols;
const stepY = H / rows;

for (let row = 0; row < rows; row++) {
for (let col = 0; col < cols; col++) {
const x = col * stepX + stepX * 0.5 + (rand() - 0.5) * stepX * 0.32;
const y = row * stepY + stepY * 0.5 + (rand() - 0.5) * stepY * 0.32;

if (x < 4 || x > W - 4 || y < 4 || y > H - 4) continue;
if (inShape(x, y)) candidates.push({ x, y });
}
}

candidates.sort((a, b) => {
const ay = Math.abs(a.y - 470);
const by = Math.abs(b.y - 470);
const ax = Math.abs(a.x - 500);
const bx = Math.abs(b.x - 500);
return (ay + ax * 0.45) - (by + bx * 0.45);
});

return candidates.slice(0, TARGET_TILES);
}

function drawBackground() {
const g = ctx.createRadialGradient(500, 440, 30, 500, 500, 680);
g.addColorStop(0, "rgba(255,255,255,0.11)");
g.addColorStop(0.28, "rgba(255,255,255,0.05)");
g.addColorStop(1, "rgba(255,255,255,0)");
ctx.fillStyle = g;
ctx.fillRect(0, 0, W, H);
}

function drawBoardFrameGuide() {
ctx.save();
ctx.strokeStyle = "rgba(255,255,255,0.12)";
ctx.lineWidth = 2;
ctx.strokeRect(110, 110, 780, 780);

ctx.strokeStyle = "rgba(255,255,255,0.05)";
ctx.lineWidth = 1;
for (let i = 1; i < 6; i++) {
const x = 110 + i * 130;
const y = 110 + i * 130;
ctx.beginPath();
ctx.moveTo(x, 110);
ctx.lineTo(x, 890);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(110, y);
ctx.lineTo(890, y);
ctx.stroke();
}
ctx.restore();
}

function drawVisibleSwallowBase() {
ctx.save();

ctx.shadowColor = "rgba(255,255,255,0.22)";
ctx.shadowBlur = 26;
ctx.fillStyle = "rgba(255,255,255,0.24)";
swallowShapePath(ctx);
ctx.fill();

ctx.shadowBlur = 12;
ctx.lineCap = "round";
ctx.lineWidth = 12;
ctx.strokeStyle = "rgba(255,255,255,0.25)";
branchStrokePath(ctx);
ctx.stroke();

ctx.fillStyle = "rgba(255,255,255,0.26)";
ctx.beginPath(); ctx.ellipse(603, 286, 14, 29, -0.55, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(640, 272, 13, 27, 0.10, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(680, 255, 14, 30, -0.55, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(715, 236, 13, 27, 0.20, 0, Math.PI * 2); ctx.fill();

ctx.restore();
}

function clipToShape() {
ctx.beginPath();
swallowShapePath(ctx);

ctx.save();
ctx.lineWidth = 18;
ctx.lineCap = "round";
branchStrokePath(ctx);
ctx.strokeStyle = "#fff";
ctx.stroke();
ctx.restore();

ctx.save();
ctx.fillStyle = "#fff";
ctx.beginPath(); ctx.ellipse(603, 286, 16, 31, -0.55, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(640, 272, 15, 29, 0.10, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(680, 255, 16, 32, -0.55, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.ellipse(715, 236, 15, 29, 0.20, 0, Math.PI * 2); ctx.fill();
ctx.restore();

ctx.clip();
}

function drawTiles(points) {
ctx.save();
clipToShape();

const tileSize = 2.85;
const radius = 0.82;

for (let i = 0; i < points.length; i++) {
const p = points[i];
const fillAlpha = 0.19 + (i % 9) * 0.007;
const strokeAlpha = 0.07 + (i % 5) * 0.006;

ctx.fillStyle = `rgba(250,250,250,${fillAlpha.toFixed(3)})`;
ctx.strokeStyle = `rgba(255,255,255,${strokeAlpha.toFixed(3)})`;
ctx.lineWidth = 0.35;

roundedRect(
ctx,
p.x - tileSize / 2,
p.y - tileSize / 2,
tileSize,
tileSize,
radius
);
ctx.fill();
ctx.stroke();
}

ctx.restore();
}

function drawOutline() {
ctx.save();

ctx.strokeStyle = "rgba(255,255,255,0.35)";
ctx.lineWidth = 2.2;
swallowShapePath(ctx);
ctx.stroke();

ctx.lineCap = "round";
ctx.lineWidth = 5;
ctx.strokeStyle = "rgba(255,255,255,0.34)";
branchStrokePath(ctx);
ctx.stroke();

ctx.restore();
}

function render() {
ctx.clearRect(0, 0, W, H);
drawBackground();
drawBoardFrameGuide();
drawVisibleSwallowBase();
const tiles = generateTiles();
drawTiles(tiles);
drawOutline();
}

render();
</script>
</body>
</html>
