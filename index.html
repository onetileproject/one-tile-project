<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Tile Project</title>


<style>


*{

box-sizing:border-box;

margin:0;

padding:0;

}


body{


font-family:Arial, Helvetica, sans-serif;

height:100vh;

overflow:hidden;


background-image:url("page-background.png");

background-size:cover;

background-position:center;


display:flex;

flex-direction:column;

align-items:center;


color:#333;


}


.title{


margin-top:40px;


font-size:64px;


font-family:"Brush Script MT", cursive;


background:linear-gradient(90deg,#1f67cb,#7b39b8,#d16f31,#d74444);

-webkit-background-clip:text;

color:transparent;


}


.subtitle{


margin-top:10px;

font-size:18px;


}


.progress-number{


margin-top:10px;


}


.progress{


width:300px;

height:10px;


background:#ddd;


border-radius:10px;


overflow:hidden;


margin-top:8px;


}


.progress-bar{


width:0%;

height:100%;


background:#6fa4ff;


}


.buy{


margin-top:12px;


padding:10px 22px;


border-radius:30px;


border:1px solid #ccc;


background:white;


cursor:pointer;


}


.board{


margin-top:20px;


width:620px;

height:360px;


border-radius:18px;


border:3px solid rgba(255,255,255,0.9);


overflow:hidden;


box-shadow:0 10px 25px rgba(0,0,0,0.15);


position:relative;


}


.board img{


width:100%;

height:100%;


object-fit:cover;


filter:blur(28px);


}


.admin-badge{


position:absolute;


top:10px;

right:10px;


background:black;

color:white;


font-size:12px;


padding:6px 10px;


border-radius:20px;


display:none;


}


.actions{


margin-top:16px;


display:flex;


gap:10px;


}


.button{


padding:10px 20px;


border-radius:30px;


border:1px solid #ccc;


background:white;


cursor:pointer;


}


.socials{


margin-top:18px;


display:flex;


gap:14px;


}


.circle{


width:42px;

height:42px;


border-radius:50%;


display:flex;

align-items:center;

justify-content:center;


color:white;


font-weight:bold;


}


.instagram{background:linear-gradient(45deg,#ff5f6d,#ffc371,#833ab4)}

.x{background:black}

.tiktok{background:black}

.facebook{background:#1877f2}


.footer{


margin-top:20px;


font-size:14px;


color:#666;


}


</style>

</head>


<body>


<h1 class="title">One Tile Project</h1>


<div class="subtitle">

Claim your tile. Leave your mark. Be part of digital history.

</div>


<div class="progress-number">0%</div>


<div class="progress">

<div class="progress-bar"></div>

</div>


<button class="buy">Buy Tiles</button>


<div class="board">


<div class="admin-badge">ADMIN MODE</div>


<img src="swallow-artwork.png">


</div>


<div class="actions">


<button class="button">Share</button>


<button class="button">Find My Tile</button>


</div>


<div class="socials">


<div class="circle instagram">◎</div>

<div class="circle x">X</div>

<div class="circle tiktok">♪</div>

<div class="circle facebook">f</div>


</div>


<div class="footer">


Terms & Conditions • Privacy Policy • © 2024 One Tile Project


</div>


<script>


const params=new URLSearchParams(window.location.search)


if(params.get("admin")==="true"){


document.querySelector(".board img").style.filter="none"


document.querySelector(".admin-badge").style.display="block"


}


</script>


</body>

</html>
