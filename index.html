<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One Tile Project</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;
}

.header{
margin-top:30px;
}

h1{
font-size:42px;
margin-bottom:8px;
}

.tagline{
color:#bdbdbd;
margin-bottom:20px;
}

.progress-wrap{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.progress{
width:260px;
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
}

.board{
position:relative;
width:70vmin;
height:70vmin;
margin:auto;
border-radius:18px;
overflow:hidden;
border:1px solid #333;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.art{
width:100%;
height:100%;
object-fit:cover;
filter:blur(16px);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.buy{
margin-top:15px;
padding:10px 18px;
border-radius:20px;
border:none;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.admin{
position:absolute;
top:10px;
right:10px;
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="header">

<h1>One Tile Project</h1>

<div class="tagline">
Claim your tile. Leave your mark. Be part of digital history.
</div>

<div class="progress-wrap">

<div>0 / 50000 Tiles</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<button class="buy">Buy Tiles</button>

</div>


<div class="board">

<img class="art"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Swallow_silhouette.svg/1200px-Swallow_silhouette.svg.png">

<div class="overlay"></div>

<div class="admin">ADMIN PREVIEW</div>

</div>

</body>
</html>
