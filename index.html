<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    :root {

      --page-bg: #f7f4ee;

      --text: #2f2f2f;

      --muted: #666;

      --line: rgba(0, 0, 0, 0.12);

      --white-line: rgba(255, 255, 255, 0.88);

      --btn-bg: rgba(255, 255, 255, 0.96);

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      background: var(--page-bg);

      font-family: Arial, Helvetica, sans-serif;

      color: var(--text);

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      height: 100svh;

      overflow: hidden;

      position: relative;

      background: var(--page-bg);

    }


    /* ελαφρύ paper texture */

    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.12;

      background-image:

        radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1.4px),

        radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1.4px);

      background-size: 26px 26px, 42px 42px;

      background-position: 0 0, 11px 13px;

    }


    .content {

      position: relative;

      z-index: 3;

      width: 100%;

      height: 100%;

      max-width: 1280px;

      margin: 0 auto;

      padding: 18px 18px 12px;

      display: grid;

      grid-template-rows:

        auto   /* title */

        auto   /* tagline */

        auto   /* progress value */

        auto   /* progress bar */

        auto   /* buy button */

        1fr    /* board area */

        auto   /* actions */

        auto   /* socials */

        auto;  /* footer */

      justify-items: center;

      align-items: start;

      gap: 8px;

    }


    .title {

      margin: 0;

      font-size: clamp(42px, 6vw, 82px);

      line-height: 1;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #1f67cb 0%, #7b39b8 42%, #d06d31 72%, #d74444 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

      text-align: center;

    }


    .tagline {

      margin: 0;

      text-align: center;

      font-size: clamp(16px, 1.7vw, 22px);

      color: #3f3f3f;

      max-width: 900px;

    }


    .progress-value {

      font-size: 16px;

      color: #4c4c4c;

      line-height: 1;

      margin-top: 4px;

    }


    .progress {

      width: min(340px, 76vw);

      height: 12px;

      border-radius: 999px;

      background: #d9d9d9;

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);

    }


    .progress-bar {

      width: 0%;

      height: 100%;

      background: linear-gradient(90deg, #7ea7f2 0%, #5c81d8 100%);

      border-radius: 999px;

    }


    .buy-btn,

    .action-btn {

      border: 1px solid rgba(0,0,0,0.18);

      background: var(--btn-bg);

      color: #3a3a3a;

      border-radius: 999px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    }


    .buy-btn {

      padding: 12px 24px;

      font-size: 16px;

      margin-top: 2px;

    }


    .board-area {

      width: 100%;

      height: 100%;

      min-height: 0;

      display: flex;

      align-items: center;

      justify-content: center;

      position: relative;

    }


    /* Καθαρές πιτσιλιές ΜΟΝΟ γύρω από το board */

    .splash-cloud {

      position: absolute;

      width: min(1000px, 92vw);

      height: min(620px, 60vh);

      pointer-events: none;

      z-index: 1;

      background:

        /* left cluster */

        radial-gradient(circle at 20% 54%, rgba(55,132,255,0.98) 0 2.8%, transparent 3.2%),

        radial-gradient(circle at 18% 60%, rgba(255,173,44,0.95) 0 3.0%, transparent 3.6%),

        radial-gradient(circle at 22% 66%, rgba(145,88,255,0.92) 0 2.7%, transparent 3.3%),

        radial-gradient(circle at 26% 72%, rgba(255,109,62,0.85) 0 2.0%, transparent 2.7%),

        radial-gradient(circle at 29% 50%, rgba(75,173,255,0.42) 0 8%, transparent 12%),

        radial-gradient(circle at 23% 70%, rgba(255,188,74,0.38) 0 7%, transparent 11%),


        /* right cluster */

        radial-gradient(circle at 80% 53%, rgba(255,109,39,0.98) 0 2.9%, transparent 3.4%),

        radial-gradient(circle at 82% 60%, rgba(55,197,255,0.96) 0 3.0%, transparent 3.6%),

        radial-gradient(circle at 77% 68%, rgba(255,211,82,0.94) 0 2.8%, transparent 3.4%),

        radial-gradient(circle at 73% 74%, rgba(136,93,255,0.84) 0 2.0%, transparent 2.6%),

        radial-gradient(circle at 76% 54%, rgba(255,134,66,0.42) 0 8%, transparent 12%),

        radial-gradient(circle at 79% 69%, rgba(58,191,255,0.38) 0 7%, transparent 11%),


        /* μικρές πιτσιλιές */

        radial-gradient(circle at 16% 44%, rgba(255,99,140,0.70) 0 0.8%, transparent 1.4%),

        radial-gradient(circle at 28% 38%, rgba(118,141,255,0.62) 0 0.7%, transparent 1.3%),

        radial-gradient(circle at 84% 42%, rgba(255,146,88,0.74) 0 0.8%, transparent 1.4%),

        radial-gradient(circle at 74% 36%, rgba(104,202,255,0.64) 0 0.7%, transparent 1.3%),

        radial-gradient(circle at 12% 56%, rgba(0,0,0,0.14) 0 0.35%, transparent 0.9%),

        radial-gradient(circle at 88% 58%, rgba(0,0,0,0.14) 0 0.35%, transparent 0.9%),

        radial-gradient(circle at 24% 63%, rgba(255,255,255,0.72) 0 0.95%, transparent 1.8%),

        radial-gradient(circle at 77% 64%, rgba(255,255,255,0.72) 0 0.95%, transparent 1.8%);

      background-repeat: no-repeat;

    }


    .board-wrap {

      position: relative;

      z-index: 2;

      width: min(58vmin, 540px);

      height: min(58vmin, 540px);

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board {

      width: 100%;

      height: 100%;

      border-radius: 18px;

      overflow: hidden;

      position: relative;

      border: 3px solid var(--white-line);

      box-shadow:

        0 12px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      background: linear-gradient(180deg, rgba(104,132,184,0.10), rgba(82,108,158,0.08));

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board img {

      width: 100%;

      height: 100%;

      object-fit: contain;

      display: block;

      filter: blur(30px) saturate(0.68) brightness(0.92);

      transform: scale(0.94);

      transform-origin: center center;

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),

        rgba(62, 88, 140, 0.04);

    }


    .admin-badge {

      position: absolute;

      top: 10px;

      right: 10px;

      z-index: 4;

      background: rgba(20,20,20,0.84);

      color: white;

      padding: 7px 10px;

      border-radius: 999px;

      font-size: 12px;

      letter-spacing: 0.3px;

      display: none;

    }


    .actions {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      justify-content: center;

      margin-top: 2px;

    }


    .action-btn {

      padding: 12px 22px;

      font-size: 16px;

    }


    .socials {

      display: flex;

      gap: 14px;

      justify-content: center;

      flex-wrap: wrap;

      margin-top: 2px;

    }


    .social {

      width: 48px;

      height: 48px;

      border-radius: 50%;

      display: grid;

      place-items: center;

      font-weight: bold;

      font-size: 20px;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .instagram { background: linear-gradient(135deg, #ff5f6d, #ffc371, #833ab4); }

    .x { background: #111; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      text-align: center;

      color: #6f6f6f;

      font-size: 14px;

      padding-bottom: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.94);

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 700px) {

      .content {

        padding: 14px 10px 10px;

        gap: 7px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .buy-btn,

      .action-btn {

        font-size: 14px;

        padding: 10px 16px;

      }


      .board-wrap {

        width: min(72vmin, 84vw);

        height: min(72vmin, 84vw);

      }


      .splash-cloud {

        width: 100vw;

        height: 56vh;

      }


      .social {

        width: 44px;

        height: 44px;

        font-size: 18px;

      }


      .footer {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="progress-value">0%</div>


      <div class="progress">

        <div class="progress-bar"></div>

      </div>


      <button class="buy-btn">Buy Tiles</button>


      <div class="board-area">

        <div class="splash-cloud"></div>


        <div class="board-wrap">

          <div class="board">

            <div class="admin-badge">ADMIN MODE</div>

            <img src="swallow-artwork.png" alt="Swallow artwork preview">

          </div>

        </div>

      </div>


      <div class="actions">

        <button class="action-btn">Share</button>

        <button class="action-btn">Find My Tile</button>

      </div>


      <div class="socials">

        <div class="social instagram">◎</div>

        <div class="social x">X</div>

        <div class="social tiktok">♪</div>

        <div class="social facebook">f</div>

      </div>


      <div class="footer">

        <a href="#">Terms &amp; Conditions</a>

        •

        <a href="#">Privacy Policy</a>

        •

        <span>© 2024 One Tile Project</span>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";

    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
