<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    html, body {

      margin: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      background: #f7f4ee;

      color: #222;

    }


    body {

      position: relative;

    }


    .page {

      width: 100vw;

      height: 100vh;

      height: 100svh;

      overflow: hidden;

      position: relative;

      background: #f7f4ee;

    }


    /* χρωματιστές πιτσιλιές γύρω από το board */

    .page::before {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        radial-gradient(circle at 22% 55%, rgba(70,139,255,0.75) 0 6%, transparent 18%),

        radial-gradient(circle at 18% 68%, rgba(255,174,52,0.70) 0 5%, transparent 16%),

        radial-gradient(circle at 26% 73%, rgba(151,92,255,0.65) 0 5%, transparent 16%),

        radial-gradient(circle at 76% 57%, rgba(255,114,33,0.72) 0 6%, transparent 18%),

        radial-gradient(circle at 80% 67%, rgba(69,205,255,0.72) 0 5%, transparent 17%),

        radial-gradient(circle at 72% 75%, rgba(255,215,92,0.68) 0 5%, transparent 15%),

        radial-gradient(circle at 29% 59%, rgba(255,255,255,0.35) 0 3%, transparent 10%),

        radial-gradient(circle at 69% 62%, rgba(255,255,255,0.30) 0 3%, transparent 10%),

        radial-gradient(circle at 17% 43%, rgba(255,99,140,0.45) 0 2.2%, transparent 9%),

        radial-gradient(circle at 84% 42%, rgba(255,161,88,0.42) 0 2.2%, transparent 9%),

        #f7f4ee;

      filter: saturate(1.05);

      opacity: 0.95;

    }


    /* μικρές πιτσιλιές/σκόνη */

    .page::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      opacity: 0.32;

      background-image:

        radial-gradient(circle at 18% 59%, rgba(53,129,255,0.95) 0 2px, transparent 3px),

        radial-gradient(circle at 21% 71%, rgba(255,171,53,0.95) 0 3px, transparent 4px),

        radial-gradient(circle at 25% 78%, rgba(149,89,255,0.85) 0 2px, transparent 3px),

        radial-gradient(circle at 79% 59%, rgba(255,108,28,0.95) 0 3px, transparent 4px),

        radial-gradient(circle at 82% 68%, rgba(58,189,255,0.90) 0 2px, transparent 3px),

        radial-gradient(circle at 73% 77%, rgba(255,206,84,0.92) 0 3px, transparent 4px),

        radial-gradient(circle at 15% 63%, rgba(0,0,0,0.10) 0 1px, transparent 2px),

        radial-gradient(circle at 80% 64%, rgba(0,0,0,0.10) 0 1px, transparent 2px),

        radial-gradient(circle at 23% 75%, rgba(255,255,255,0.85) 0 4px, transparent 5px),

        radial-gradient(circle at 77% 73%, rgba(255,255,255,0.8) 0 4px, transparent 5px);

      background-size: 100% 100%;

    }


    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      height: 100%;

      max-width: 1280px;

      margin: 0 auto;

      display: flex;

      flex-direction: column;

      align-items: center;

      padding: 22px 18px 12px;

    }


    .title {

      margin: 0;

      font-size: clamp(44px, 6vw, 88px);

      line-height: 1;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 500;

      background: linear-gradient(90deg, #1e67cb 0%, #7b39b8 42%, #d06d31 72%, #d64040 100%);

      -webkit-background-clip: text;

      background-clip: text;

      color: transparent;

      text-align: center;

    }


    .tagline {

      margin: 10px 0 14px;

      font-size: clamp(18px, 1.9vw, 22px);

      color: #3c3c3c;

      text-align: center;

      max-width: 900px;

    }


    .progress-value {

      font-size: 16px;

      color: #4a4a4a;

      margin-bottom: 8px;

    }


    .progress {

      width: min(340px, 76vw);

      height: 12px;

      border-radius: 999px;

      background: #d9d9d9;

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);

    }


    .progress-bar {

      width: 0%;

      height: 100%;

      background: linear-gradient(90deg, #7ea7f2 0%, #5b80d8 100%);

      border-radius: 999px;

    }


    .buy-btn {

      margin-top: 16px;

      border: 1px solid rgba(0,0,0,0.20);

      background: rgba(255,255,255,0.94);

      color: #333;

      padding: 14px 28px;

      border-radius: 999px;

      font-size: 18px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .board-wrap {

      margin-top: 18px;

      width: min(62vw, 740px);

      flex: 1 1 auto;

      min-height: 0;

      display: flex;

      align-items: center;

      justify-content: center;

      position: relative;

    }


    .board {

      width: 100%;

      aspect-ratio: 1.55 / 0.85;

      max-height: 43vh;

      max-height: 43svh;

      border-radius: 18px;

      overflow: hidden;

      position: relative;

      border: 3px solid rgba(255,255,255,0.85);

      box-shadow:

        0 10px 28px rgba(0,0,0,0.12),

        0 0 0 1px rgba(0,0,0,0.08);

      background: linear-gradient(180deg, rgba(108,138,192,0.14), rgba(89,116,170,0.10));

      display: flex;

      align-items: center;

      justify-content: center;

    }


    .board img {

      width: 100%;

      height: 100%;

      object-fit: contain;

      display: block;

      filter: blur(34px) saturate(0.68) brightness(0.92);

      transform: scale(0.92);

      transform-origin: center center;

    }


    .board::after {

      content: "";

      position: absolute;

      inset: 0;

      pointer-events: none;

      background:

        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),

        rgba(62, 88, 140, 0.04);

    }


    .admin-badge {

      position: absolute;

      top: 10px;

      right: 10px;

      z-index: 4;

      background: rgba(20,20,20,0.82);

      color: white;

      padding: 7px 10px;

      border-radius: 999px;

      font-size: 12px;

      letter-spacing: 0.3px;

      display: none;

    }


    .actions {

      margin-top: 18px;

      display: flex;

      gap: 14px;

      flex-wrap: wrap;

      justify-content: center;

    }


    .action-btn {

      border: 1px solid rgba(0,0,0,0.18);

      background: rgba(255,255,255,0.95);

      color: #3a3a3a;

      padding: 14px 26px;

      border-radius: 999px;

      font-size: 17px;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    }


    .socials {

      margin-top: 18px;

      display: flex;

      gap: 16px;

      justify-content: center;

      flex-wrap: wrap;

    }


    .social {

      width: 52px;

      height: 52px;

      border-radius: 50%;

      display: grid;

      place-items: center;

      font-weight: bold;

      font-size: 22px;

      color: white;

      box-shadow: 0 4px 10px rgba(0,0,0,0.10);

    }


    .instagram { background: linear-gradient(135deg, #ff5f6d, #ffc371, #833ab4); }

    .x { background: #111; }

    .tiktok { background: #111; }

    .facebook { background: #1877f2; }


    .footer {

      margin-top: 16px;

      text-align: center;

      color: #6f6f6f;

      font-size: 15px;

      padding-bottom: 2px;

    }


    .footer a {

      color: inherit;

      text-decoration: none;

      margin: 0 8px;

    }


    body.admin-mode .board img {

      filter: none;

      transform: scale(0.92);

    }


    body.admin-mode .admin-badge {

      display: inline-block;

    }


    @media (max-width: 900px) {

      .board-wrap {

        width: min(78vw, 720px);

      }

    }


    @media (max-width: 700px) {

      .content {

        padding: 16px 10px 10px;

      }


      .title {

        font-size: clamp(36px, 10vw, 56px);

      }


      .tagline {

        font-size: 15px;

        line-height: 1.35;

      }


      .buy-btn,

      .action-btn {

        font-size: 15px;

        padding: 11px 18px;

      }


      .board-wrap {

        width: 90vw;

      }


      .board {

        max-height: 36vh;

        max-height: 36svh;

      }


      .social {

        width: 46px;

        height: 46px;

        font-size: 19px;

      }


      .footer {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <div class="page">

    <div class="content">

      <h1 class="title">One Tile Project</h1>


      <div class="tagline">

        Claim your tile. Leave your mark. Be part of digital history.

      </div>


      <div class="progress-value">0%</div>


      <div class="progress">

        <div class="progress-bar"></div>

      </div>


      <button class="buy-btn">Buy Tiles</button>


      <div class="board-wrap">

        <div class="board">

          <div class="admin-badge">ADMIN MODE</div>

          <img src="swallow-artwork.png" alt="Swallow artwork preview">

        </div>

      </div>


      <div class="actions">

        <button class="action-btn">Share</button>

        <button class="action-btn">Find My Tile</button>

      </div>


      <div class="socials">

        <div class="social instagram">◎</div>

        <div class="social x">X</div>

        <div class="social tiktok">♪</div>

        <div class="social facebook">f</div>

      </div>


      <div class="footer">

        <a href="#">Terms &amp; Conditions</a>

        •

        <a href="#">Privacy Policy</a>

        •

        <span>© 2024 One Tile Project</span>

      </div>

    </div>

  </div>


  <script>

    const params = new URLSearchParams(window.location.search);

    const isAdmin = params.get("admin") === "true";

    if (isAdmin) {

      document.body.classList.add("admin-mode");

    }

  </script>

</body>

</html>
