<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Tile Project</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#ffffff;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

h1{
margin:28px 0 10px 0;
font-size:36px;
letter-spacing:0.5px;
}

p{
margin:0 0 26px 0;
color:#bdbdbd;
font-size:16px;
}

.artboard{
margin:32px auto 56px auto;
width:min(92vw,1100px);
aspect-ratio:1 / 1;
position:relative;
border-radius:24px;
overflow:hidden;
border:1px solid #1e1e1e;
background:
radial-gradient(circle at center, #171717 0%, #101010 58%, #080808 100%);
box-shadow:0 0 50px rgba(0,0,0,0.45);
}

.artwork{
position:absolute;
inset:0;
z-index:1;
opacity:0.95;
filter:blur(7px);
transform:scale(0.94);
}

.grid{
position:absolute;
inset:0;
z-index:2;
display:grid;
grid-template-columns:repeat(40, 1fr);
gap:1px;
width:min(78vw,760px);
height:min(78vw,760px);
margin:auto;
top:0; right:0; bottom:0; left:0;
}

.tile{
width:100%;
aspect-ratio:1 / 1;
background:#1b1b1b;
border-radius:8px;
cursor:pointer;
transition:background 0.2s ease, transform 0.15s ease;
opacity:0.9;
}

.tile:hover{
background:#2b2b2b;
transform:scale(1.02);
}
</style>
</head>
<body>

<h1>One Tile Project</h1>
<p>Claim your tile. Leave your mark. Be part of digital history.</p>

<div class="artboard">

<svg class="artwork" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<!-- background haze -->
<rect x="0" y="0" width="1000" height="1000" fill="transparent"/>

<!-- swallow -->
<path
d="M145 510
C210 460, 255 405, 325 350
C410 282, 515 255, 600 278
C650 292, 690 318, 735 355
C780 330, 825 285, 900 230
C858 315, 816 378, 760 432
C720 470, 675 496, 628 515
C676 545, 723 595, 784 692
C705 650, 647 616, 596 580
C555 551, 530 536, 500 525
C462 545, 432 573, 390 618
C344 666, 284 726, 190 812
C240 707, 280 630, 328 560
C255 551, 198 536, 145 510 Z"
fill="#151515"
/>

<!-- inner swallow volume -->
<path
d="M255 505
C320 452, 370 404, 438 360
C505 317, 570 305, 632 322
C675 334, 712 357, 744 386
C701 418, 662 440, 621 458
C662 485, 705 532, 754 606
C689 580, 638 555, 592 527
C557 506, 533 492, 500 481
C457 503, 425 532, 389 572
C351 613, 311 657, 256 714
C286 643, 313 591, 352 540
C315 531, 283 520, 255 505 Z"
fill="#1d1d1d"
/>

<!-- olive branch -->
<g transform="translate(575 585) rotate(-20)">
<rect x="0" y="0" width="220" height="16" rx="8" fill="#191919"/>
<ellipse cx="38" cy="-16" rx="18" ry="8" fill="#202020"/>
<ellipse cx="76" cy="30" rx="18" ry="8" fill="#202020"/>
<ellipse cx="120" cy="-18" rx="18" ry="8" fill="#202020"/>
<ellipse cx="158" cy="30" rx="18" ry="8" fill="#202020"/>
<ellipse cx="198" cy="-16" rx="18" ry="8" fill="#202020"/>
</g>
</svg>

<div class="grid">
<script>
for(let i=0;i<1600;i++){
document.write('<div class="tile"></div>');
}
</script>
</div>

</div>

</body>
</html>
