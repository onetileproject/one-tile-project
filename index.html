<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Tile Project</title>


  <style>

    * {

      box-sizing: border-box;

    }


    :root {

      --page-width: 1440px;

      --page-height: 1024px;


      --title-top: 38px;

      --tagline-top: 154px;

      --hero-button-top: 208px;


      --board-top: 338px;

      --board-left: 75px;

      --board-width: 1290px;

      --board-height: 336px;


      --progress-top: 693px;

      --progress-left: 420px;

      --progress-width: 602px;

      --progress-height: 64px;


      --actions-top: 780px;

      --actions-left: 375px;

      --actions-gap: 22px;


      --footer-top: 880px;

    }


    html, body {

      margin: 0;

      min-height: 100%;

      background: #ece8e3;

      font-family: Arial, Helvetica, sans-serif;

      overflow-x: hidden;

    }


    body {

      display: flex;

      justify-content: center;

      align-items: flex-start;

      padding: 0;

    }


    .site {

      position: relative;

      width: 100%;

      max-width: var(--page-width);

      aspect-ratio: 1440 / 1024;

      background: url("page-background.png") center top / cover no-repeat;

      overflow: hidden;

    }


    .overlay {

      position: absolute;

      inset: 0;

    }


    .title {

      position: absolute;

      top: var(--title-top);

      left: 50%;

      transform: translateX(-50%);

      margin: 0;

      font-size: clamp(46px, 5vw, 86px);

      line-height: 1;

      font-weight: 900;

      letter-spacing: -0.02em;

      color: #141414;

      text-transform: uppercase;

      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;

      text-shadow: 0 1px 0 rgba(255,255,255,0.25);

      white-space: nowrap;

    }


    .tagline {

      position: absolute;

      top: var(--tagline-top);

      left: 50%;

      transform: translateX(-50%);

      margin: 0;

      width: min(980px, 80%);

      text-align: center;

      font-size: clamp(16px, 1.6vw, 24px);

      color: #333;

      font-weight: 400;

      letter-spacing: 0.01em;

      white-space: nowrap;

    }


    .hero-buy {

      position: absolute;

      top: var(--hero-button-top);

      left: 50%;

      transform: translateX(-50%);

      border: 0;

      border-radius: 999px;

      min-width: 360px;

      height: 78px;

      padding: 0 34px;

      cursor: pointer;

      color: #fff;

      font-size: 28px;

      font-weight: 800;

      background:

        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0) 35%),

        linear-gradient(135deg, #3f86ff 0%, #4f92ff 38%, #6bb0ff 100%);

      box-shadow:

        inset 0 1px 1px rgba(255,255,255,0.35),

        0 10px 20px rgba(48, 108, 214, 0.28);

      display: inline-flex;

      align-items: center;

      justify-content: center;

      gap: 16px;

    }


    .hero-buy span.arrow {

      font-size: 28px;

      transform: translateY(-1px);

    }


    .board-shell {

      position: absolute;

      top: var(--board-top);

      left: var(--board-left);

      width: var(--board-width);

      height: var(--board-height);

      border-radius: 10px;

      overflow: hidden;

      box-shadow:

        0 0 0 2px rgba(255,255,255,0.68),

        0 0 0 4px rgba(18,18,18,0.78),

        0 16px 18px rgba(0,0,0,0.18);

      background: rgba(241,239,236,0.88);

    }


    #tileBoard {

      display: block;

      width: 100%;

      height: 100%;

    }


    .progress-wrap {

      position: absolute;

      top: var(--progress-top);

      left: var(--progress-left);

      width: var(--progress-width);

      height: var(--progress-height);

      pointer-events: none;

    }


    .progress-label {

      text-align: center;

      color: #fff;

      font-weight: 800;

      font-size: 22px;

      letter-spacing: 0.02em;

      text-transform: uppercase;

      text-shadow: 0 1px 1px rgba(0,0,0,0.24);

      margin-bottom: 8px;

    }


    .progress-label .sold {

      color: #f0bf34;

      font-size: 28px;

      font-style: italic;

    }


    .progress-bar {

      width: 100%;

      height: 12px;

      border-radius: 999px;

      background: rgba(32,32,32,0.6);

      overflow: hidden;

      box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);

    }


    .progress-fill {

      width: 20.57%;

      height: 100%;

      background: linear-gradient(90deg, #dca50c, #f0bf34, #ffd65a);

      border-radius: 999px;

    }


    .actions {

      position: absolute;

      top: var(--actions-top);

      left: 50%;

      transform: translateX(-50%);

      display: flex;

      gap: var(--actions-gap);

      align-items: center;

      justify-content: center;

      flex-wrap: nowrap;

    }


    .pill-btn {

      border: 0;

      border-radius: 999px;

      height: 66px;

      padding: 0 34px;

      font-size: 20px;

      font-weight: 800;

      cursor: pointer;

      display: inline-flex;

      align-items: center;

      justify-content: center;

      gap: 12px;

      box-shadow:

        inset 0 1px 1px rgba(255,255,255,0.16),

        0 8px 16px rgba(0,0,0,0.14);

    }


    .pill-btn.buy {

      min-width: 250px;

      color: #1c1c1c;

      background: linear-gradient(180deg, #ffd93d 0%, #efc11b 100%);

    }


    .pill-btn.dark {

      min-width: 250px;

      color: white;

      background: linear-gradient(180deg, #1c1c1c 0%, #0f0f0f 100%);

    }


    .footer-left {

      position: absolute;

      top: calc(var(--footer-top) + 12px);

      left: 90px;

      color: #111;

      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;

      font-size: clamp(24px, 2.5vw, 52px);

      line-height: 0.95;

      text-transform: uppercase;

      transform: rotate(-2deg);

    }


    .footer-left::after {

      content: "";

      display: block;

      width: 210px;

      height: 7px;

      margin-top: 10px;

      background: #e8b01d;

      border-radius: 999px;

      transform: rotate(-2deg);

    }


    .footer-center {

      position: absolute;

      top: calc(var(--footer-top) + 8px);

      left: 50%;

      transform: translateX(-50%);

      width: 620px;

      text-align: center;

      color: #161616;

    }


    .footer-center .line1 {

      font-size: 18px;

      letter-spacing: 0.02em;

      font-weight: 500;

    }


    .footer-center .line2 {

      margin-top: 8px;

      font-size: 26px;

      line-height: 1.05;

      font-family: "Brush Script MT", "Segoe Script", cursive;

      font-weight: 700;

    }


    .footer-socials {

      position: absolute;

      top: calc(var(--footer-top) + 22px);

      right: 116px;

      display: flex;

      gap: 16px;

      align-items: center;

    }


    .social {

      width: 58px;

      height: 58px;

      border-radius: 14px;

      display: flex;

      align-items: center;

      justify-content: center;

      color: #fff;

      font-size: 26px;

      font-weight: 700;

      box-shadow: 0 8px 14px rgba(0,0,0,0.16);

      user-select: none;

    }


    .social.tiktok {

      background: #111;

    }


    .social.instagram {

      background:

        radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);

    }


    @media (max-width: 1100px) {

      .site {

        aspect-ratio: auto;

        min-height: 100vh;

        background-position: center top;

      }


      .tagline {

        width: 90%;

        white-space: normal;

      }


      .actions {

        gap: 12px;

      }


      .pill-btn {

        min-width: auto !important;

        padding: 0 22px;

        font-size: 18px;

      }


      .footer-left {

        left: 36px;

      }


      .footer-socials {

        right: 36px;

      }

    }


    @media (max-width: 860px) {

      html, body {

        overflow-x: hidden;

      }


      .site {

        aspect-ratio: auto;

        min-height: 100vh;

      }


      .title {

        white-space: normal;

        width: 90%;

        text-align: center;

      }


      .hero-buy {

        min-width: 280px;

        height: 64px;

        font-size: 22px;

      }


      .actions {

        flex-wrap: wrap;

        width: 90%;

      }


      .footer-center {

        width: 86%;

      }

    }

  </style>

</head>

<body>

  <main class="site">

    <div class="overlay">

      <h1 class="title">THE TILE PROJECT</h1>


      <p class="tagline">Claim your tile. Leave your mark. Be part of digital history.</p>


      <button class="hero-buy" type="button">

        <span>Buy a Tile</span>

        <span class="arrow">▶</span>

      </button>


      <div class="board-shell">

        <canvas id="tileBoard"></canvas>

      </div>


      <div class="progress-wrap">

        <div class="progress-label">

          TILES SOLD: <span class="sold">12,342</span> / 60,000

        </div>

        <div class="progress-bar">

          <div class="progress-fill"></div>

        </div>

      </div>


      <div class="actions">

        <button class="pill-btn buy" type="button">🛒 BUY A TILE</button>

        <button class="pill-btn dark" type="button">⌕ FIND MY TILE</button>

        <button class="pill-btn dark" type="button">➜ SHARE</button>

      </div>


      <div class="footer-left">WHAT WILL THE FINAL ARTWORK BE?</div>


      <div class="footer-center">

        <div class="line1">60,000 Tiles, Create a Piece of Art.</div>

        <div class="line2">Take your tile. Leave your mark.</div>

      </div>


      <div class="footer-socials">

        <div class="social tiktok">♪</div>

        <div class="social instagram">◎</div>

      </div>

    </div>

  </main>


  <script>

    const canvas = document.getElementById("tileBoard");

    const ctx = canvas.getContext("2d");


    const COLS = 250;

    const ROWS = 240;


    function resizeCanvas() {

      const rect = canvas.getBoundingClientRect();

      const dpr = window.devicePixelRatio || 1;


      canvas.width = Math.round(rect.width * dpr);

      canvas.height = Math.round(rect.height * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);


      drawBoard(rect.width, rect.height);

    }


    function drawRoundedRect(x, y, w, h, r, fillStyle, strokeStyle, lineWidth = 1) {

      ctx.beginPath();

      ctx.moveTo(x + r, y);

      ctx.lineTo(x + w - r, y);

      ctx.quadraticCurveTo(x + w, y, x + w, y + r);

      ctx.lineTo(x + w, y + h - r);

      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);

      ctx.lineTo(x + r, y + h);

      ctx.quadraticCurveTo(x, y + h, x, y + h - r);

      ctx.lineTo(x, y + r);

      ctx.quadraticCurveTo(x, y, x + r, y);

      ctx.closePath();


      ctx.fillStyle = fillStyle;

      ctx.fill();


      if (strokeStyle) {

        ctx.strokeStyle = strokeStyle;

        ctx.lineWidth = lineWidth;

        ctx.stroke();

      }

    }


    function colorFromSeed(seed) {

      const palettes = [

        ["#5ab0ff", "#2e74ff", "#183153"],

        ["#ffcb3c", "#fb8500", "#3d2c00"],

        ["#ef476f", "#ff7aa2", "#41101f"],

        ["#00b4d8", "#90e0ef", "#123b48"],

        ["#8338ec", "#c77dff", "#2a1040"],

        ["#111111", "#5f5f5f", "#d9d9d9"]

      ];

      return palettes[seed % palettes.length];

    }


    function drawFakeImageTile(x, y, w, h, seed) {

      const [c1, c2, c3] = colorFromSeed(seed);


      drawRoundedRect(x, y, w, h, 2.5, "#f8f8f8", "rgba(0,0,0,0.12)", 0.4);


      const pad = Math.max(1, w * 0.06);

      const ix = x + pad;

      const iy = y + pad;

      const iw = w - pad * 2;

      const ih = h - pad * 2;


      const grad = ctx.createLinearGradient(ix, iy, ix + iw, iy + ih);

      grad.addColorStop(0, c1);

      grad.addColorStop(0.5, c2);

      grad.addColorStop(1, c3);


      drawRoundedRect(ix, iy, iw, ih, 1.8, grad, "rgba(255,255,255,0.35)", 0.25);


      ctx.strokeStyle = "rgba(255,255,255,0.55)";

      ctx.lineWidth = 0.45;

      ctx.beginPath();

      ctx.moveTo(ix + iw * 0.1, iy + ih * 0.82);

      ctx.lineTo(ix + iw * 0.45, iy + ih * 0.42);

      ctx.lineTo(ix + iw * 0.68, iy + ih * 0.62);

      ctx.lineTo(ix + iw * 0.92, iy + ih * 0.26);

      ctx.stroke();


      ctx.beginPath();

      ctx.arc(ix + iw * 0.26, iy + ih * 0.28, Math.max(0.8, iw * 0.08), 0, Math.PI * 2);

      ctx.fillStyle = "rgba(255,255,255,0.85)";

      ctx.fill();

    }


    function buildFilledCells() {

      const cells = [];


      for (let c = 0; c < COLS; c++) {

        if (c < 62 || c > 181) cells.push([c, 0]);

        if (c < 55 || c > 189) cells.push([c, 1]);

      }


      for (let r = 2; r < 62; r++) {

        const leftWidth = Math.max(6, 56 - r);

        const rightStart = Math.min(COLS - 1, COLS - leftWidth);


        for (let c = 0; c < leftWidth; c++) {

          if ((c + r) % 2 === 0 || c < 5) cells.push([c, r]);

        }


        for (let c = rightStart; c < COLS; c++) {

          if ((c + r) % 2 === 1 || c > COLS - 6) cells.push([c, r]);

        }

      }


      for (let r = ROWS - 58; r < ROWS; r++) {

        const depth = ROWS - r;

        const leftWidth = Math.max(10, 68 - depth);

        const rightStart = Math.min(COLS - 1, COLS - leftWidth);


        for (let c = 0; c < leftWidth; c++) {

          if ((c + r) % 2 === 0 || c < 4) cells.push([c, r]);

        }


        for (let c = rightStart; c < COLS; c++) {

          if ((c + r) % 2 === 1 || c > COLS - 5) cells.push([c, r]);

        }

      }


      return cells;

    }


    function drawBoard(width, height) {

      ctx.clearRect(0, 0, width, height);


      ctx.fillStyle = "rgba(244,242,239,0.96)";

      ctx.fillRect(0, 0, width, height);


      const cw = width / COLS;

      const ch = height / ROWS;


      ctx.strokeStyle = "rgba(84,84,84,0.33)";

      ctx.lineWidth = 0.55;


      for (let i = 0; i <= COLS; i++) {

        const x = Math.round(i * cw) + 0.5;

        ctx.beginPath();

        ctx.moveTo(x, 0);

        ctx.lineTo(x, height);

        ctx.stroke();

      }


      for (let j = 0; j <= ROWS; j++) {

        const y = Math.round(j * ch) + 0.5;

        ctx.beginPath();

        ctx.moveTo(0, y);

        ctx.lineTo(width, y);

        ctx.stroke();

      }


      const filledCells = buildFilledCells();


      filledCells.forEach(([c, r], idx) => {

        const x = c * cw;

        const y = r * ch;

        drawFakeImageTile(x + 0.3, y + 0.3, cw - 0.6, ch - 0.6, idx + c + r);

      });

    }


    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();

  </script>

</body>

</html>
