<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One Tile Project</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
}

p{
color:#bbb;
}

.grid{
margin:40px auto;
width:min(90vw, 900px);
display:grid;
grid-template-columns:repeat(40, 1fr);
gap:1px;
}

.tile{
width:100%;
aspect-ratio:1 / 1;
background:#1c1c1c;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.tile:hover{
background:#444;
}

</style>
</head>

<body>

<h1>One Tile Project</h1>

<p>Claim your tile. Leave your mark and be part of digital history.</p>

<div class="grid">

<script>

for(let i=0;i<1600;i++){

document.write('<div class="tile"></div>')

}

</script>

</div>

</body>
</html>
